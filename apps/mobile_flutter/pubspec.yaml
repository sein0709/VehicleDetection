name: greyeye_mobile
description: GreyEye vehicle detection and traffic monitoring mobile application.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.0

  # Routing
  go_router: ^14.0.0

  # Auth
  supabase_flutter: ^2.8.0

  # Networking
  dio: ^5.4.0
  web_socket_channel: ^3.0.0

  # Storage
  flutter_secure_storage: ^9.2.0
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.0
  path: ^1.9.0

  # Charts & Maps
  fl_chart: ^0.68.0
  flutter_map: ^7.0.0
  latlong2: ^0.9.0

  # On-device ML inference
  tflite_flutter: ^0.11.0
  camera: ^0.11.0
  image: ^4.3.0
  image_picker: ^1.1.0

  # Export
  csv: ^6.0.0
  pdf: ^3.11.0
  share_plus: ^10.0.0

  # Utilities
  intl: ">=0.19.0 <0.21.0"
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.0
  uuid: ^4.4.0
  file_picker: ^10.3.10
  excel: ^4.0.6
  video_thumbnail: ^0.5.6
  # FFmpeg-based first-frame extraction for codecs the platform thumbnailer
  # cannot decode (notably .DAV files from Dahua CCTV recorders).
  #
  # IMPORTANT: the `_min` flavour ships with FFmpeg's built-in software
  # codecs only — NOT system codecs. Specifically the macOS arm64 build
  # has --disable-videotoolbox / --disable-avfoundation / --disable-png
  # in its configure flags. We therefore force MJPEG output (always
  # built in) in VideoFrameExtractor and accept either PNG or JPEG
  # bytes downstream. Verified against ffmpeg-kit-flutter-new 3.1.0
  # / FFmpeg 8.0 on 2026-04-22.
  #
  # The full-GPL flavour was avoided because it pulls in /opt/homebrew/*
  # dynamic-link paths on macOS that crash at launch on machines without
  # Homebrew installed. Used only by VideoFrameExtractor — the analysis
  # pipeline still receives MP4.
  ffmpeg_kit_flutter_new_min: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  build_runner: ^2.4.0
  drift_dev: ^2.18.0
  json_serializable: ^6.8.0
  freezed: ^2.5.0
  riverpod_generator: ^2.4.0
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - lib/core/l10n/
    - assets/models/
    - assets/images/
    - assets/test/
