name: greyeye_mobile
description: GreyEye vehicle detection and traffic monitoring mobile application.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.0

  # Routing
  go_router: ^14.0.0

  # Networking
  dio: ^5.4.0
  web_socket_channel: ^3.0.0

  # Storage
  flutter_secure_storage: ^9.2.0
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.0

  # Charts & Maps
  fl_chart: ^0.68.0
  flutter_map: ^7.0.0
  latlong2: ^0.9.0

  # Utilities
  intl: ^0.20.2
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.4.0
  json_serializable: ^6.8.0
  freezed: ^2.5.0
  riverpod_generator: ^2.4.0
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - lib/core/l10n/
