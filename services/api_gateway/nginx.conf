# GreyEye API Gateway — Production Nginx Configuration
#
# TLS termination, JWT validation (delegates to Auth Service), rate limiting,
# circuit breaker behavior, request/response logging with X-Request-ID,
# CORS policy, health check aggregation, security headers.
#
# Service hostnames are substituted at runtime via envsubst (see docker-entrypoint.sh).
# Defaults: localhost (for local dev). Set AUTH_SERVICE_HOST, CONFIG_SERVICE_HOST, etc.
# in Docker Compose or Kubernetes for deployment.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 2048;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ────────────────────────────────────────────────────────────────

    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"request_id":"$request_id_out",'
            '"method":"$request_method",'
            '"uri":"$uri",'
            '"request":"$request",'
            '"status":"$status",'
            '"body_bytes_sent":"$body_bytes_sent",'
            '"request_time":"$request_time",'
            '"upstream_addr":"$upstream_addr",'
            '"upstream_status":"$upstream_status",'
            '"upstream_response_time":"$upstream_response_time",'
            '"http_referer":"$http_referer",'
            '"http_user_agent":"$http_user_agent",'
            '"http_x_user_id":"$http_x_user_id",'
            '"http_x_camera_id":"$http_x_camera_id"'
        '}';

    access_log /var/log/nginx/access.log json_combined;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # ── Request size limits ────────────────────────────────────────────────────
    client_max_body_size 10m;

    # ── Gzip ───────────────────────────────────────────────────────────────────

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml application/xml+rss text/javascript;

    # ── Rate limit zones ───────────────────────────────────────────────────────
    # From design: 60/min per IP, 300/min per user, 15/sec per camera
    # Additional: 10/min per IP on auth endpoints, 5/5min per user on exports

    limit_req_zone $binary_remote_addr   zone=per_ip:10m       rate=1r/s;
    limit_req_zone $limit_user_key       zone=per_user:10m     rate=5r/s;
    limit_req_zone $limit_camera_key     zone=per_camera:10m   rate=15r/s;
    limit_req_zone $binary_remote_addr   zone=auth_ip:10m      rate=10r/m;
    limit_req_zone $limit_user_key       zone=export_user:10m  rate=1r/m;

    limit_req_status 429;
    limit_req_log_level warn;

    # ── Map: per-user key ──────────────────────────────────────────────────────
    map $http_x_user_id $limit_user_key {
        default     $binary_remote_addr;
        "~."        $http_x_user_id;
    }

    # ── Map: per-camera key ────────────────────────────────────────────────────
    map $http_x_camera_id $limit_camera_key {
        default     $binary_remote_addr;
        "~."        $http_x_camera_id;
    }

    # ── Map: X-Request-ID propagation ──────────────────────────────────────────
    map $http_x_request_id $request_id_out {
        default     $request_id;
        "~."        $http_x_request_id;
    }

    # ── Map: CORS origin whitelist ─────────────────────────────────────────────
    # In production, replace $http_origin with a strict whitelist.
    # Set CORS_ALLOWED_ORIGIN env var for deployment (default: permissive for dev).
    map $http_origin $cors_origin {
        default     "";
        "~."        $http_origin;
    }

    # ── Map: WebSocket upgrade ─────────────────────────────────────────────────
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ""      close;
    }

    # ── Upstream definitions ───────────────────────────────────────────────────
    # max_fails + fail_timeout implement circuit breaker behavior:
    #   - After max_fails consecutive failures within fail_timeout, the upstream
    #     is marked unavailable for fail_timeout seconds (circuit OPEN).
    #   - After fail_timeout expires, nginx probes with a single request (HALF-OPEN).
    #   - If the probe succeeds, the upstream is restored (circuit CLOSED).
    #
    # Spec: open after 5 consecutive failures, half-open after 15s.

    upstream auth_upstream {
        server ${AUTH_SERVICE_HOST}:8001 max_fails=5 fail_timeout=15s;
        keepalive 32;
    }

    upstream config_upstream {
        server ${CONFIG_SERVICE_HOST}:8002 max_fails=5 fail_timeout=15s;
        keepalive 32;
    }

    upstream ingest_upstream {
        server ${INGEST_SERVICE_HOST}:8003 max_fails=5 fail_timeout=15s;
        keepalive 32;
    }

    upstream reporting_upstream {
        server ${REPORTING_API_HOST}:8005 max_fails=5 fail_timeout=15s;
        keepalive 32;
    }

    upstream aggregator_upstream {
        server ${AGGREGATOR_HOST}:8006 max_fails=5 fail_timeout=15s;
        keepalive 32;
    }

    upstream notification_upstream {
        server ${NOTIFICATION_SERVICE_HOST}:8007 max_fails=5 fail_timeout=15s;
        keepalive 32;
    }

    # ── Error response bodies ──────────────────────────────────────────────────
    # JSON error bodies for rate-limit and circuit-breaker responses.

    map $status $retry_after_value {
        429     "60";
        503     "15";
        default "";
    }

    # ── HTTP → HTTPS redirect (production) ─────────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        location = /healthz {
            default_type application/json;
            access_log off;
            return 200 '{"status":"ok","gateway":"up"}';
        }

        # In production, redirect all other traffic to HTTPS.
        # In dev (TLS_ENABLED=false), this block is replaced by the full config.
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── Main HTTPS server ──────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name _;

        # ── TLS configuration (SEC-4) ─────────────────────────────────────────
        ssl_certificate     /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:TLS_AES_128_GCM_SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-GCM-SHA256';
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;

        # OCSP stapling (when using a real CA certificate)
        # ssl_stapling on;
        # ssl_stapling_verify on;

        # ── Security headers ──────────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "0" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;

        # ── Request correlation ────────────────────────────────────────────────
        add_header X-Request-ID $request_id_out always;

        # ── CORS policy ───────────────────────────────────────────────────────
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID, X-User-Id, X-Camera-ID, Accept" always;
        add_header Access-Control-Expose-Headers "X-Request-ID, Retry-After, X-RateLimit-Remaining" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Max-Age 86400 always;

        root /usr/share/nginx/html;

        # ── Error pages ───────────────────────────────────────────────────────
        error_page 429 = @rate_limited;
        error_page 502 503 504 /50x.html;

        location @rate_limited {
            default_type application/json;
            add_header Retry-After $retry_after_value always;
            add_header X-Request-ID $request_id_out always;
            return 429 '{"error":{"code":"RATE_LIMITED","message":"Too many requests. Please retry later.","request_id":"$request_id_out"}}';
        }

        # ── CORS preflight ────────────────────────────────────────────────────
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $cors_origin;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID, X-User-Id, X-Camera-ID, Accept";
            add_header Access-Control-Allow-Credentials "true";
            add_header Access-Control-Max-Age 86400;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }

        # ── JWT validation subrequest ──────────────────────────────────────────
        # Delegates token introspection to the Auth Service. The auth service
        # returns 200 + X-User-Id / X-User-Role headers on success, or 401/403.
        location = /_auth_validate {
            internal;
            proxy_pass              http://auth_upstream/v1/auth/validate;
            proxy_pass_request_body off;
            proxy_set_header        Content-Length "";
            proxy_set_header        X-Original-URI $request_uri;
            proxy_set_header        X-Original-Method $request_method;
            proxy_set_header        Authorization $http_authorization;
            proxy_set_header        X-Request-ID $request_id_out;
            proxy_connect_timeout   5s;
            proxy_read_timeout      5s;
        }

        # ── Health checks ─────────────────────────────────────────────────────

        location = /healthz {
            default_type application/json;
            access_log off;
            return 200 '{"status":"ok","gateway":"up"}';
        }

        location = /readyz {
            default_type application/json;
            access_log off;
            proxy_pass http://auth_upstream/healthz;
            proxy_connect_timeout 3s;
            proxy_read_timeout 3s;
            error_page 502 503 504 = @readyz_fail;
        }

        location @readyz_fail {
            default_type application/json;
            return 503 '{"status":"not_ready","message":"One or more upstreams unreachable"}';
        }

        # ── API Routes ────────────────────────────────────────────────────────

        # Auth endpoints — tighter IP-based rate limit, no JWT required
        location /v1/auth/ {
            limit_req zone=auth_ip burst=3 nodelay;
            limit_req zone=per_ip burst=10 nodelay;
            proxy_pass http://auth_upstream;
            include proxy_params;
        }

        # Users — requires JWT
        location /v1/users/ {
            auth_request /_auth_validate;
            auth_request_set $auth_user_id $upstream_http_x_user_id;
            auth_request_set $auth_user_role $upstream_http_x_user_role;
            proxy_set_header X-User-Id $auth_user_id;
            proxy_set_header X-User-Role $auth_user_role;

            limit_req zone=per_user burst=50 nodelay;
            proxy_pass http://auth_upstream;
            include proxy_params;
        }

        # ── Config: sites ─────────────────────────────────────────────────────
        location /v1/sites/ {
            auth_request /_auth_validate;
            auth_request_set $auth_user_id $upstream_http_x_user_id;
            auth_request_set $auth_user_role $upstream_http_x_user_role;
            proxy_set_header X-User-Id $auth_user_id;
            proxy_set_header X-User-Role $auth_user_role;

            limit_req zone=per_user burst=50 nodelay;
            proxy_pass http://config_upstream;
            include proxy_params;
        }

        location = /v1/sites {
            auth_request /_auth_validate;
            auth_request_set $auth_user_id $upstream_http_x_user_id;
            auth_request_set $auth_user_role $upstream_http_x_user_role;
            proxy_set_header X-User-Id $auth_user_id;
            proxy_set_header X-User-Role $auth_user_role;

            limit_req zone=per_user burst=50 nodelay;
            proxy_pass http://config_upstream;
            include proxy_params;
        }

        # ── Config: cameras ───────────────────────────────────────────────────
        location /v1/cameras/ {
            auth_request /_auth_validate;
            auth_request_set $auth_user_id $upstream_http_x_user_id;
            auth_request_set $auth_user_role $upstream_http_x_user_role;
            proxy_set_header X-User-Id $auth_user_id;
            proxy_set_header X-User-Role $auth_user_role;

            limit_req zone=per_user burst=50 nodelay;
            proxy_pass http://config_upstream;
            include proxy_params;
        }

        location = /v1/cameras {
            auth_request /_auth_validate;
            auth_request_set $auth_user_id $upstream_http_x_user_id;
            auth_request_set $auth_user_role $upstream_http_x_user_role;
            proxy_set_header X-User-Id $auth_user_id;
            proxy_set_header X-User-Role $auth_user_role;

            limit_req zone=per_user burst=50 nodelay;
            proxy_pass http://config_upstream;
            include proxy_params;
        }

        # ── Config: ROI presets ────────────────────────────────────────────────
        location /v1/roi-presets/ {
            auth_request /_auth_validate;
            auth_request_set $auth_user_id $upstream_http_x_user_id;
            auth_request_set $auth_user_role $upstream_http_x_user_role;
            proxy_set_header X-User-Id $auth_user_id;
            proxy_set_header X-User-Role $auth_user_role;

            limit_req zone=per_user burst=50 nodelay;
            proxy_pass http://config_upstream;
            include proxy_params;
        }

        location = /v1/roi-presets {
            auth_request /_auth_validate;
            auth_request_set $auth_user_id $upstream_http_x_user_id;
            auth_request_set $auth_user_role $upstream_http_x_user_role;
            proxy_set_header X-User-Id $auth_user_id;
            proxy_set_header X-User-Role $auth_user_role;

            limit_req zone=per_user burst=50 nodelay;
            proxy_pass http://config_upstream;
            include proxy_params;
        }

        # ── Config: config-versions ────────────────────────────────────────────
        location /v1/config-versions/ {
            auth_request /_auth_validate;
            auth_request_set $auth_user_id $upstream_http_x_user_id;
            auth_request_set $auth_user_role $upstream_http_x_user_role;
            proxy_set_header X-User-Id $auth_user_id;
            proxy_set_header X-User-Role $auth_user_role;

            limit_req zone=per_user burst=50 nodelay;
            proxy_pass http://config_upstream;
            include proxy_params;
        }

        location = /v1/config-versions {
            auth_request /_auth_validate;
            auth_request_set $auth_user_id $upstream_http_x_user_id;
            auth_request_set $auth_user_role $upstream_http_x_user_role;
            proxy_set_header X-User-Id $auth_user_id;
            proxy_set_header X-User-Role $auth_user_role;

            limit_req zone=per_user burst=50 nodelay;
            proxy_pass http://config_upstream;
            include proxy_params;
        }

        # ── Ingest: frame upload (per-camera rate limit) ──────────────────────
        location /v1/ingest/ {
            auth_request /_auth_validate;
            auth_request_set $auth_user_id $upstream_http_x_user_id;
            auth_request_set $auth_user_role $upstream_http_x_user_role;
            proxy_set_header X-User-Id $auth_user_id;
            proxy_set_header X-User-Role $auth_user_role;

            limit_req zone=per_camera burst=5 nodelay;
            client_max_body_size 50m;
            proxy_pass http://ingest_upstream;
            include proxy_params;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # ── Reporting: analytics ──────────────────────────────────────────────
        location /v1/analytics/ {
            auth_request /_auth_validate;
            auth_request_set $auth_user_id $upstream_http_x_user_id;
            auth_request_set $auth_user_role $upstream_http_x_user_role;
            proxy_set_header X-User-Id $auth_user_id;
            proxy_set_header X-User-Role $auth_user_role;

            limit_req zone=per_user burst=50 nodelay;
            proxy_pass http://reporting_upstream;
            include proxy_params;
        }

        location = /v1/analytics {
            auth_request /_auth_validate;
            auth_request_set $auth_user_id $upstream_http_x_user_id;
            auth_request_set $auth_user_role $upstream_http_x_user_role;
            proxy_set_header X-User-Id $auth_user_id;
            proxy_set_header X-User-Role $auth_user_role;

            limit_req zone=per_user burst=50 nodelay;
            proxy_pass http://reporting_upstream;
            include proxy_params;
        }

        # ── WebSocket: live analytics ─────────────────────────────────────────
        location /v1/analytics/live/ws {
            auth_request /_auth_validate;
            auth_request_set $auth_user_id $upstream_http_x_user_id;
            auth_request_set $auth_user_role $upstream_http_x_user_role;
            proxy_set_header X-User-Id $auth_user_id;
            proxy_set_header X-User-Role $auth_user_role;

            limit_req zone=per_user burst=50 nodelay;
            proxy_pass http://reporting_upstream;
            include proxy_params;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── Reporting: reports ────────────────────────────────────────────────
        location /v1/reports/ {
            auth_request /_auth_validate;
            auth_request_set $auth_user_id $upstream_http_x_user_id;
            auth_request_set $auth_user_role $upstream_http_x_user_role;
            proxy_set_header X-User-Id $auth_user_id;
            proxy_set_header X-User-Role $auth_user_role;

            limit_req zone=per_user burst=50 nodelay;
            proxy_pass http://reporting_upstream;
            include proxy_params;
        }

        location = /v1/reports {
            auth_request /_auth_validate;
            auth_request_set $auth_user_id $upstream_http_x_user_id;
            auth_request_set $auth_user_role $upstream_http_x_user_role;
            proxy_set_header X-User-Id $auth_user_id;
            proxy_set_header X-User-Role $auth_user_role;

            limit_req zone=per_user burst=50 nodelay;
            proxy_pass http://reporting_upstream;
            include proxy_params;
        }

        # ── Report export: tighter per-user rate limit (5 per 5 min) ──────────
        location /v1/reports/export {
            auth_request /_auth_validate;
            auth_request_set $auth_user_id $upstream_http_x_user_id;
            auth_request_set $auth_user_role $upstream_http_x_user_role;
            proxy_set_header X-User-Id $auth_user_id;
            proxy_set_header X-User-Role $auth_user_role;

            limit_req zone=export_user burst=2 nodelay;
            limit_req zone=per_user burst=50 nodelay;
            proxy_pass http://reporting_upstream;
            include proxy_params;
        }

        # ── Report share links (public, no JWT) ──────────────────────────────
        location /v1/reports/shared/ {
            limit_req zone=per_ip burst=10 nodelay;
            proxy_pass http://reporting_upstream;
            include proxy_params;
        }

        # ── Alerts ────────────────────────────────────────────────────────────
        location /v1/alerts/ {
            auth_request /_auth_validate;
            auth_request_set $auth_user_id $upstream_http_x_user_id;
            auth_request_set $auth_user_role $upstream_http_x_user_role;
            proxy_set_header X-User-Id $auth_user_id;
            proxy_set_header X-User-Role $auth_user_role;

            limit_req zone=per_user burst=50 nodelay;
            proxy_pass http://notification_upstream;
            include proxy_params;
        }

        location = /v1/alerts {
            auth_request /_auth_validate;
            auth_request_set $auth_user_id $upstream_http_x_user_id;
            auth_request_set $auth_user_role $upstream_http_x_user_role;
            proxy_set_header X-User-Id $auth_user_id;
            proxy_set_header X-User-Role $auth_user_role;

            limit_req zone=per_user burst=50 nodelay;
            proxy_pass http://notification_upstream;
            include proxy_params;
        }

        # ── Alert rules ───────────────────────────────────────────────────────
        location /v1/alert-rules/ {
            auth_request /_auth_validate;
            auth_request_set $auth_user_id $upstream_http_x_user_id;
            auth_request_set $auth_user_role $upstream_http_x_user_role;
            proxy_set_header X-User-Id $auth_user_id;
            proxy_set_header X-User-Role $auth_user_role;

            limit_req zone=per_user burst=50 nodelay;
            proxy_pass http://notification_upstream;
            include proxy_params;
        }

        location = /v1/alert-rules {
            auth_request /_auth_validate;
            auth_request_set $auth_user_id $upstream_http_x_user_id;
            auth_request_set $auth_user_role $upstream_http_x_user_role;
            proxy_set_header X-User-Id $auth_user_id;
            proxy_set_header X-User-Role $auth_user_role;

            limit_req zone=per_user burst=50 nodelay;
            proxy_pass http://notification_upstream;
            include proxy_params;
        }

        # ── Catch-all: 404 ────────────────────────────────────────────────────
        location / {
            default_type application/json;
            return 404 '{"error":{"code":"NOT_FOUND","message":"No route matches this path","request_id":"$request_id_out"}}';
        }
    }
}
