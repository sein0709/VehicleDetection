# GreyEye API Gateway — Development Configuration (HTTP only, no TLS)
#
# Used for local development where TLS is not needed.
# Includes the same rate limiting, CORS, request correlation, and routing
# as the production config, but listens on port 80 only.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"request_id":"$request_id_out",'
            '"method":"$request_method",'
            '"uri":"$uri",'
            '"request":"$request",'
            '"status":"$status",'
            '"body_bytes_sent":"$body_bytes_sent",'
            '"request_time":"$request_time",'
            '"upstream_addr":"$upstream_addr",'
            '"upstream_status":"$upstream_status",'
            '"upstream_response_time":"$upstream_response_time",'
            '"http_referer":"$http_referer",'
            '"http_user_agent":"$http_user_agent"'
        '}';

    access_log /var/log/nginx/access.log json_combined;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    client_max_body_size 10m;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml application/xml+rss text/javascript;

    # Rate limit zones
    limit_req_zone $binary_remote_addr   zone=per_ip:10m       rate=1r/s;
    limit_req_zone $limit_user_key       zone=per_user:10m     rate=5r/s;
    limit_req_zone $limit_camera_key     zone=per_camera:10m   rate=15r/s;
    limit_req_zone $binary_remote_addr   zone=auth_ip:10m      rate=10r/m;
    limit_req_zone $limit_user_key       zone=export_user:10m  rate=1r/m;

    limit_req_status 429;
    limit_req_log_level warn;

    map $http_x_user_id $limit_user_key {
        default     $binary_remote_addr;
        "~."        $http_x_user_id;
    }

    map $http_x_camera_id $limit_camera_key {
        default     $binary_remote_addr;
        "~."        $http_x_camera_id;
    }

    map $http_x_request_id $request_id_out {
        default     $request_id;
        "~."        $http_x_request_id;
    }

    map $http_origin $cors_origin {
        default     "";
        "~."        $http_origin;
    }

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ""      close;
    }

    # Upstreams with circuit breaker: open after 5 failures, half-open after 15s
    upstream auth_upstream {
        server ${AUTH_SERVICE_HOST}:8001 max_fails=5 fail_timeout=15s;
        keepalive 32;
    }

    upstream config_upstream {
        server ${CONFIG_SERVICE_HOST}:8002 max_fails=5 fail_timeout=15s;
        keepalive 32;
    }

    upstream ingest_upstream {
        server ${INGEST_SERVICE_HOST}:8003 max_fails=5 fail_timeout=15s;
        keepalive 32;
    }

    upstream reporting_upstream {
        server ${REPORTING_API_HOST}:8005 max_fails=5 fail_timeout=15s;
        keepalive 32;
    }

    upstream aggregator_upstream {
        server ${AGGREGATOR_HOST}:8006 max_fails=5 fail_timeout=15s;
        keepalive 32;
    }

    upstream notification_upstream {
        server ${NOTIFICATION_SERVICE_HOST}:8007 max_fails=5 fail_timeout=15s;
        keepalive 32;
    }

    server {
        listen 80;
        listen [::]:80;
        server_name _;

        root /usr/share/nginx/html;
        error_page 502 503 504 /50x.html;

        add_header X-Request-ID $request_id_out always;

        # CORS (permissive for dev)
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID, X-User-Id, X-Camera-ID, Accept" always;
        add_header Access-Control-Expose-Headers "X-Request-ID, Retry-After" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Max-Age 86400 always;

        # Health checks
        location = /healthz {
            default_type application/json;
            access_log off;
            return 200 '{"status":"ok","gateway":"up"}';
        }

        location = /readyz {
            default_type application/json;
            access_log off;
            proxy_pass http://auth_upstream/healthz;
            proxy_connect_timeout 3s;
            proxy_read_timeout 3s;
            error_page 502 503 504 = @readyz_fail;
        }

        location @readyz_fail {
            default_type application/json;
            return 503 '{"status":"not_ready","message":"One or more upstreams unreachable"}';
        }

        # Auth (no JWT required)
        location /v1/auth/ {
            limit_req zone=auth_ip burst=3 nodelay;
            limit_req zone=per_ip burst=10 nodelay;
            proxy_pass http://auth_upstream;
            include proxy_params;
        }

        # Users
        location /v1/users/ {
            limit_req zone=per_user burst=50 nodelay;
            proxy_pass http://auth_upstream;
            include proxy_params;
        }

        # Config: sites
        location /v1/sites/ {
            limit_req zone=per_user burst=50 nodelay;
            proxy_pass http://config_upstream;
            include proxy_params;
        }

        location = /v1/sites {
            limit_req zone=per_user burst=50 nodelay;
            proxy_pass http://config_upstream;
            include proxy_params;
        }

        # Config: cameras
        location /v1/cameras/ {
            limit_req zone=per_user burst=50 nodelay;
            proxy_pass http://config_upstream;
            include proxy_params;
        }

        location = /v1/cameras {
            limit_req zone=per_user burst=50 nodelay;
            proxy_pass http://config_upstream;
            include proxy_params;
        }

        # Config: ROI presets
        location /v1/roi-presets/ {
            limit_req zone=per_user burst=50 nodelay;
            proxy_pass http://config_upstream;
            include proxy_params;
        }

        location = /v1/roi-presets {
            limit_req zone=per_user burst=50 nodelay;
            proxy_pass http://config_upstream;
            include proxy_params;
        }

        # Config: config-versions
        location /v1/config-versions/ {
            limit_req zone=per_user burst=50 nodelay;
            proxy_pass http://config_upstream;
            include proxy_params;
        }

        location = /v1/config-versions {
            limit_req zone=per_user burst=50 nodelay;
            proxy_pass http://config_upstream;
            include proxy_params;
        }

        # Ingest
        location /v1/ingest/ {
            limit_req zone=per_camera burst=5 nodelay;
            client_max_body_size 50m;
            proxy_pass http://ingest_upstream;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID      $request_id_out;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
            proxy_next_upstream error timeout http_502 http_503;
            proxy_next_upstream_timeout 10s;
            proxy_next_upstream_tries 2;
        }

        # Analytics
        location /v1/analytics/ {
            limit_req zone=per_user burst=50 nodelay;
            proxy_pass http://reporting_upstream;
            include proxy_params;
        }

        location = /v1/analytics {
            limit_req zone=per_user burst=50 nodelay;
            proxy_pass http://reporting_upstream;
            include proxy_params;
        }

        # WebSocket: live analytics
        location /v1/analytics/live/ws {
            limit_req zone=per_user burst=50 nodelay;
            proxy_pass http://reporting_upstream;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID      $request_id_out;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_connect_timeout 10s;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Reports
        location /v1/reports/ {
            limit_req zone=per_user burst=50 nodelay;
            proxy_pass http://reporting_upstream;
            include proxy_params;
        }

        location = /v1/reports {
            limit_req zone=per_user burst=50 nodelay;
            proxy_pass http://reporting_upstream;
            include proxy_params;
        }

        # Report export (tighter limit)
        location /v1/reports/export {
            limit_req zone=export_user burst=2 nodelay;
            limit_req zone=per_user burst=50 nodelay;
            proxy_pass http://reporting_upstream;
            include proxy_params;
        }

        # Report share links (public)
        location /v1/reports/shared/ {
            limit_req zone=per_ip burst=10 nodelay;
            proxy_pass http://reporting_upstream;
            include proxy_params;
        }

        # Alerts
        location /v1/alerts/ {
            limit_req zone=per_user burst=50 nodelay;
            proxy_pass http://notification_upstream;
            include proxy_params;
        }

        location = /v1/alerts {
            limit_req zone=per_user burst=50 nodelay;
            proxy_pass http://notification_upstream;
            include proxy_params;
        }

        # Alert rules
        location /v1/alert-rules/ {
            limit_req zone=per_user burst=50 nodelay;
            proxy_pass http://notification_upstream;
            include proxy_params;
        }

        location = /v1/alert-rules {
            limit_req zone=per_user burst=50 nodelay;
            proxy_pass http://notification_upstream;
            include proxy_params;
        }

        # Catch-all
        location / {
            default_type application/json;
            return 404 '{"error":{"code":"NOT_FOUND","message":"No route matches this path","request_id":"$request_id_out"}}';
        }
    }
}
