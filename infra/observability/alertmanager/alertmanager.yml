###############################################################################
# GreyEye — Alertmanager Configuration
#
# Routes alerts from Prometheus to PagerDuty (critical/P1-P2) and Slack
# (warning/informational). Grouped by service team with appropriate
# deduplication and throttling.
#
# Secrets are injected via environment variables in production:
#   - PAGERDUTY_SERVICE_KEY_PLATFORM
#   - PAGERDUTY_SERVICE_KEY_ML
#   - SLACK_WEBHOOK_URL
#   - SMTP_AUTH_PASSWORD
###############################################################################

global:
  resolve_timeout: 5m
  smtp_from: "alerts@greyeye.io"
  smtp_smarthost: "smtp.greyeye.io:587"
  smtp_auth_username: "alerts@greyeye.io"
  smtp_auth_password: "${SMTP_AUTH_PASSWORD}"
  smtp_require_tls: true
  pagerduty_url: "https://events.pagerduty.com/v2/enqueue"
  slack_api_url: "${SLACK_WEBHOOK_URL}"

templates:
  - "/etc/alertmanager/templates/*.tmpl"

inhibit_rules:
  # If a service is completely down, suppress latency/error-rate alerts for it
  - source_matchers:
      - alertname =~ ".*ServiceDown|.*WorkerDown"
    target_matchers:
      - alertname =~ ".*LatencyHigh|.*ErrorRate.*|.*Slow"
    equal: ["job"]

  # If Redis is down, suppress Redis latency and memory alerts
  - source_matchers:
      - alertname = "RedisDown"
    target_matchers:
      - alertname =~ "Redis.*"
      - alertname != "RedisDown"

  # If DB connection pool is full, suppress slow query alerts
  - source_matchers:
      - alertname = "DatabaseConnectionPoolFull"
    target_matchers:
      - alertname = "DatabaseSlowQueries"

route:
  receiver: slack-default
  group_by: ["alertname", "namespace", "job"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    # ── Critical alerts → PagerDuty (platform team) ─────────────────────────
    - matchers:
        - severity = "critical"
        - team = "platform"
      receiver: pagerduty-platform
      group_wait: 10s
      repeat_interval: 1h
      continue: true

    # ── Critical alerts → PagerDuty (ML team) ──────────────────────────────
    - matchers:
        - severity = "critical"
        - team = "ml"
      receiver: pagerduty-ml
      group_wait: 10s
      repeat_interval: 1h
      continue: true

    # ── All critical alerts also go to Slack #incidents ─────────────────────
    - matchers:
        - severity = "critical"
      receiver: slack-incidents
      group_wait: 10s
      repeat_interval: 2h

    # ── Warning alerts → Slack #alerts ─────────────────────────────────────
    - matchers:
        - severity = "warning"
      receiver: slack-warnings
      group_wait: 1m
      repeat_interval: 6h

    # ── Operations team (camera offline, etc.) → Slack #operations ─────────
    - matchers:
        - team = "operations"
      receiver: slack-operations
      group_wait: 2m
      repeat_interval: 4h

receivers:
  # ── PagerDuty: Platform Team ──────────────────────────────────────────────
  - name: pagerduty-platform
    pagerduty_configs:
      - service_key: "${PAGERDUTY_SERVICE_KEY_PLATFORM}"
        severity: '{{ if eq .CommonLabels.severity "critical" }}critical{{ else }}warning{{ end }}'
        description: '{{ .CommonAnnotations.summary }}'
        details:
          firing: '{{ .Alerts.Firing | len }}'
          resolved: '{{ .Alerts.Resolved | len }}'
          description: '{{ .CommonAnnotations.description }}'
          runbook: '{{ .CommonAnnotations.runbook_url }}'

  # ── PagerDuty: ML Team ───────────────────────────────────────────────────
  - name: pagerduty-ml
    pagerduty_configs:
      - service_key: "${PAGERDUTY_SERVICE_KEY_ML}"
        severity: '{{ if eq .CommonLabels.severity "critical" }}critical{{ else }}warning{{ end }}'
        description: '{{ .CommonAnnotations.summary }}'
        details:
          firing: '{{ .Alerts.Firing | len }}'
          resolved: '{{ .Alerts.Resolved | len }}'
          description: '{{ .CommonAnnotations.description }}'

  # ── Slack: #greyeye-incidents (critical) ─────────────────────────────────
  - name: slack-incidents
    slack_configs:
      - channel: "#greyeye-incidents"
        send_resolved: true
        title: '{{ if eq .Status "firing" }}🔴{{ else }}✅{{ end }} [{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
        text: >-
          *Summary:* {{ .CommonAnnotations.summary }}

          *Description:* {{ .CommonAnnotations.description }}

          *Severity:* {{ .CommonLabels.severity }} | *Team:* {{ .CommonLabels.team }}

          {{ if .CommonAnnotations.runbook_url }}*Runbook:* {{ .CommonAnnotations.runbook_url }}{{ end }}

          *Firing:* {{ .Alerts.Firing | len }} | *Resolved:* {{ .Alerts.Resolved | len }}
        actions:
          - type: button
            text: "View in Grafana"
            url: "https://grafana.greyeye.io/d/system-overview"
          - type: button
            text: "Runbook"
            url: '{{ .CommonAnnotations.runbook_url }}'

  # ── Slack: #greyeye-alerts (warnings) ────────────────────────────────────
  - name: slack-warnings
    slack_configs:
      - channel: "#greyeye-alerts"
        send_resolved: true
        title: '{{ if eq .Status "firing" }}🟡{{ else }}✅{{ end }} [{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
        text: >-
          *Summary:* {{ .CommonAnnotations.summary }}

          *Severity:* {{ .CommonLabels.severity }} | *Team:* {{ .CommonLabels.team }}

          *Firing:* {{ .Alerts.Firing | len }}

  # ── Slack: #greyeye-operations (camera/field alerts) ─────────────────────
  - name: slack-operations
    slack_configs:
      - channel: "#greyeye-operations"
        send_resolved: true
        title: '{{ if eq .Status "firing" }}📷{{ else }}✅{{ end }} {{ .CommonLabels.alertname }}'
        text: >-
          {{ .CommonAnnotations.summary }}

          {{ .CommonAnnotations.description }}

  # ── Slack: default catch-all ──────────────────────────────────────────────
  - name: slack-default
    slack_configs:
      - channel: "#greyeye-alerts"
        send_resolved: true
        title: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
        text: '{{ .CommonAnnotations.summary }}'
