###############################################################################
# GreyEye — Backup & DR Alerting Rules
#
# Per docs/07-backup-and-recovery.md Section 11
###############################################################################

groups:
  - name: greyeye-backup
    interval: 5m
    rules:
      # ── pgBackRest Backup Freshness ──────────────────────────────────────

      - alert: BackupFullOverdue
        expr: |
          (time() - pgbackrest_backup_last_success_timestamp{type="full"}) > 93600
        for: 15m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Full backup overdue (>26h since last success)"
          description: >-
            No successful full backup in {{ $value | humanizeDuration }}.
            Expected daily at 02:00 UTC. Check pgbackrest-full CronJob.
          runbook_url: "https://wiki.greyeye.io/runbooks/backup-overdue"

      - alert: BackupDiffOverdue
        expr: |
          (time() - pgbackrest_backup_last_success_timestamp{type="diff"}) > 28800
        for: 15m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Differential backup overdue (>8h since last success)"
          description: >-
            No successful differential backup in {{ $value | humanizeDuration }}.
            Expected every 6 hours.

      - alert: BackupFailed
        expr: |
          kube_job_status_failed{job_name=~".*pgbackrest.*"} > 0
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "pgBackRest backup job failed"
          description: "Job {{ $labels.job_name }} in namespace {{ $labels.namespace }} has failed."

      # ── WAL Archiving ────────────────────────────────────────────────────

      - alert: WALArchiveGap
        expr: |
          pgbackrest_wal_archive_gap_segments > 10
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "WAL archive gap detected ({{ $value }} segments behind)"
          description: >-
            WAL archiving is falling behind. This may indicate network issues
            to S3 or high write volume. RPO may be at risk.

      - alert: WALArchiveStalled
        expr: |
          (time() - pgbackrest_wal_archive_last_success_timestamp) > 900
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "WAL archiving stalled (>15 min since last archive)"
          description: >-
            No WAL segment archived in {{ $value | humanizeDuration }}.
            RPO of 15 minutes is at risk. Check archive_command and S3 connectivity.

      # ── DR Replication ───────────────────────────────────────────────────

      - alert: DRReplicationLagCritical
        expr: |
          aws_rds_replica_lag_seconds{db_instance_identifier=~".*-dr$"} > 900
        for: 10m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "DR replica lag exceeds RPO ({{ $value }}s > 900s)"
          description: >-
            Cross-region DR replica lag is {{ $value | humanizeDuration }},
            exceeding the 15-minute RPO target. Investigate network throughput
            and write volume on the primary.

      - alert: DRReplicationLagWarning
        expr: |
          aws_rds_replica_lag_seconds{db_instance_identifier=~".*-dr$"} > 300
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "DR replica lag elevated ({{ $value }}s)"
          description: >-
            Cross-region DR replica lag is {{ $value | humanizeDuration }}.
            Monitor for further degradation.

      - alert: DRReplicaDisconnected
        expr: |
          aws_rds_replica_lag_seconds{db_instance_identifier=~".*-dr$"} == -1
          or absent(aws_rds_replica_lag_seconds{db_instance_identifier=~".*-dr$"})
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "DR replica disconnected or metric missing"
          description: >-
            Cannot determine DR replica lag. The replica may be disconnected
            from the primary. Immediate investigation required.

      # ── Backup Size Anomaly ──────────────────────────────────────────────

      - alert: BackupSizeAnomaly
        expr: |
          abs(
            pgbackrest_backup_size_bytes{type="full"}
            - avg_over_time(pgbackrest_backup_size_bytes{type="full"}[7d])
          ) > 2 * stddev_over_time(pgbackrest_backup_size_bytes{type="full"}[7d])
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Backup size anomaly detected"
          description: >-
            Full backup size ({{ $value | humanize1024 }}) deviates significantly
            from the 7-day average. May indicate data corruption, bulk load,
            or accidental deletion.

      # ── Restore Drill ───────────────────────────────────────────────────

      - alert: RestoreDrillOverdue
        expr: |
          (time() - greyeye_restore_drill_last_success_timestamp) > 3888000
        for: 1h
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Monthly restore drill overdue (>45 days since last success)"
          description: >-
            No successful restore drill in {{ $value | humanizeDuration }}.
            Per DM-8, drills must run monthly on the 1st Saturday.

      - alert: RestoreDrillFailed
        expr: |
          greyeye_restore_drill_last_result == 0
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Last restore drill failed validation"
          description: >-
            The most recent restore drill did not pass all validation checks.
            Review drill job logs and investigate data integrity.

      # ── S3 Replication ──────────────────────────────────────────────────

      - alert: S3ReplicationPending
        expr: |
          aws_s3_replication_pending_operations > 10000
        for: 30m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "S3 CRR has {{ $value }} pending operations"
          description: >-
            Cross-region replication backlog is growing. DR region may have
            stale data. Check S3 replication metrics in the AWS console.
