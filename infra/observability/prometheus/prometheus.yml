###############################################################################
# GreyEye — Prometheus Configuration (Local Development)
###############################################################################

global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  # ── GreyEye API services ──────────────────────────────────────────────────
  - job_name: greyeye-auth-service
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8001"]
        labels:
          service: auth-service

  - job_name: greyeye-config-service
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8002"]
        labels:
          service: config-service

  - job_name: greyeye-ingest-service
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8003"]
        labels:
          service: ingest-service

  - job_name: greyeye-aggregator
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8006"]
        labels:
          service: aggregator

  - job_name: greyeye-reporting-api
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8007"]
        labels:
          service: reporting-api

  - job_name: greyeye-notification-service
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8008"]
        labels:
          service: notification-service

  # ── NATS monitoring ───────────────────────────────────────────────────────
  - job_name: nats
    metrics_path: /
    static_configs:
      - targets: ["nats:8222"]
        labels:
          service: nats

  # ── Prometheus self-monitoring ────────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
