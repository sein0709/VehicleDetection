replicaCount: 2

image:
  repository: greyeye/reporting-api
  tag: ""
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8005

resources:
  requests:
    memory: 256Mi
    cpu: 250m
  limits:
    memory: 1Gi
    cpu: 500m

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70

env:
  DEBUG: "false"

podAnnotations: {}

nodeSelector: {}

tolerations: []

affinity: {}

observability:
  logLevel: INFO
  jsonLogs: "true"
  tracingEnabled: "true"
  otlpEndpoint: "http://greyeye-tempo:4317"

serviceMonitor:
  enabled: false
  interval: 15s
  scrapeTimeout: 10s
