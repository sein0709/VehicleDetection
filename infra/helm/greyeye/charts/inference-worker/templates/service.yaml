apiVersion: v1
kind: Service
metadata:
  name: {{ include "inference-worker.fullname" . }}
  labels:
    {{- include "inference-worker.labels" . | nindent 4 }}
spec:
  type: {{ default "ClusterIP" (index .Values "service" "type") }}
  ports:
    - port: {{ default 8004 (index .Values "service" "port") }}
      targetPort: health
      protocol: TCP
      name: health
  selector:
    {{- include "inference-worker.selectorLabels" . | nindent 4 }}
