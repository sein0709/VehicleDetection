replicaCount: 2

image:
  repository: greyeye/ingest-service
  tag: ""
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8003

resources:
  requests:
    memory: 256Mi
    cpu: 200m
  limits:
    memory: 512Mi
    cpu: 500m

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 65

env:
  DEBUG: "false"

podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}

observability:
  logLevel: INFO
  jsonLogs: "true"
  tracingEnabled: "true"
  otlpEndpoint: "http://greyeye-tempo:4317"

serviceMonitor:
  enabled: false
  interval: 15s
  scrapeTimeout: 10s
