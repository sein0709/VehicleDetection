apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "pgbackrest.fullname" . }}-full
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pgbackrest.labels" . | nindent 4 }}
    greyeye.io/backup-type: full
spec:
  schedule: {{ .Values.schedule.full | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    metadata:
      labels:
        {{- include "pgbackrest.labels" . | nindent 8 }}
        greyeye.io/backup-type: full
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 14400
      template:
        metadata:
          labels:
            {{- include "pgbackrest.labels" . | nindent 12 }}
            greyeye.io/backup-type: full
        spec:
          serviceAccountName: {{ .Values.serviceAccount.name | default (include "pgbackrest.fullname" .) }}
          restartPolicy: OnFailure
          {{- with .Values.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.tolerations }}
          tolerations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.affinity }}
          affinity:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          containers:
            - name: pgbackrest-full
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command:
                - /bin/sh
                - -c
                - |
                  set -euo pipefail
                  echo "Starting full backup at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
                  pgbackrest --stanza={{ .Values.stanza }} --type=full backup
                  echo "Full backup completed at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
                  pgbackrest --stanza={{ .Values.stanza }} check
                  echo "Backup integrity check passed"
              env:
                - name: PGBACKREST_CONFIG
                  value: /etc/pgbackrest/pgbackrest.conf
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.postgresql.existingSecret }}
                      key: {{ .Values.postgresql.secretKeys.password }}
                - name: PGBACKREST_REPO1_S3_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.s3.existingSecret }}
                      key: {{ .Values.s3.secretKeys.accessKey }}
                - name: PGBACKREST_REPO1_S3_KEY_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.s3.existingSecret }}
                      key: {{ .Values.s3.secretKeys.secretKey }}
                - name: PGBACKREST_REPO1_CIPHER_PASS
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.encryption.existingSecret }}
                      key: {{ .Values.encryption.secretKey }}
              resources:
                {{- toYaml .Values.resources | nindent 16 }}
              volumeMounts:
                - name: config
                  mountPath: /etc/pgbackrest
                  readOnly: true
          volumes:
            - name: config
              configMap:
                name: {{ include "pgbackrest.fullname" . }}-config
