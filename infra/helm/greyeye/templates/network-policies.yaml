{{- if .Values.networkPolicies.enabled }}
###############################################################################
# Network Policies (SEC-13)
#
# Implements zone-based network segmentation:
#   DMZ (api-gateway) → Application (services) → Data (postgres, redis, nats)
#   Processing (inference) → Data
###############################################################################

# ── Default Deny All in greyeye-api namespace ────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all-api
  namespace: greyeye-api
  labels:
    app.kubernetes.io/part-of: greyeye
    security.greyeye.io/policy: default-deny
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# ── Default Deny All in greyeye-processing namespace ─────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all-processing
  namespace: greyeye-processing
  labels:
    app.kubernetes.io/part-of: greyeye
    security.greyeye.io/policy: default-deny
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# ── Default Deny All in greyeye-data namespace ───────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all-data
  namespace: greyeye-data
  labels:
    app.kubernetes.io/part-of: greyeye
    security.greyeye.io/policy: default-deny
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# ── API Gateway: accept external traffic, forward to services ────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-gateway-ingress
  namespace: greyeye-api
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: 443
          protocol: TCP
        - port: 80
          protocol: TCP
  egress:
    # To backend services in same namespace
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: greyeye-api
      ports:
        - port: 8001
          protocol: TCP
        - port: 8002
          protocol: TCP
        - port: 8003
          protocol: TCP
        - port: 8005
          protocol: TCP
        - port: 8006
          protocol: TCP
        - port: 8007
          protocol: TCP
    # DNS resolution
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# ── Backend Services: accept from gateway, connect to data zone ──────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backend-services
  namespace: greyeye-api
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: greyeye
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: NotIn
        values: ["api-gateway"]
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # From API gateway
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: api-gateway
      ports:
        - port: 8001
          protocol: TCP
        - port: 8002
          protocol: TCP
        - port: 8005
          protocol: TCP
        - port: 8007
          protocol: TCP
  egress:
    # To data zone: PostgreSQL
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: greyeye-data
      ports:
        - port: 5432
          protocol: TCP
    # To data zone: Redis
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: greyeye-data
      ports:
        - port: 6379
          protocol: TCP
    # To data zone: NATS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: greyeye-data
      ports:
        - port: 4222
          protocol: TCP
    # DNS resolution
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# ── Processing Zone: inference workers, aggregator, ingest ───────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-processing-services
  namespace: greyeye-processing
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # From API gateway (ingest endpoint)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: greyeye-api
          podSelector:
            matchLabels:
              app.kubernetes.io/name: api-gateway
      ports:
        - port: 8003
          protocol: TCP
        - port: 8006
          protocol: TCP
  egress:
    # To data zone: NATS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: greyeye-data
      ports:
        - port: 4222
          protocol: TCP
    # To data zone: Redis
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: greyeye-data
      ports:
        - port: 6379
          protocol: TCP
    # To data zone: PostgreSQL (aggregator writes)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: greyeye-data
      ports:
        - port: 5432
          protocol: TCP
    # To S3/MinIO (frame storage, model download)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: greyeye-data
      ports:
        - port: 9000
          protocol: TCP
        - port: 443
          protocol: TCP
    # DNS resolution
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# ── Data Zone: accept from application and processing zones only ─────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-data-zone-ingress
  namespace: greyeye-data
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # From application zone
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: greyeye-api
      ports:
        - port: 5432
          protocol: TCP
        - port: 6379
          protocol: TCP
        - port: 4222
          protocol: TCP
    # From processing zone
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: greyeye-processing
      ports:
        - port: 5432
          protocol: TCP
        - port: 6379
          protocol: TCP
        - port: 4222
          protocol: TCP
        - port: 9000
          protocol: TCP
  egress:
    # Intra-namespace only (replication between NATS nodes, etc.)
    - to:
        - podSelector: {}
    # DNS resolution
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
{{- end }}
