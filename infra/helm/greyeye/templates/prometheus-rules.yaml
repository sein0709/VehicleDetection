{{- if .Values.prometheusRules.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "greyeye.fullname" . }}-service-alerts
  labels:
    {{- include "greyeye.labels" . | nindent 4 }}
    prometheus: greyeye
    role: alert-rules
spec:
  groups:
    - name: greyeye-inference
      interval: 30s
      rules:
        - alert: InferenceLatencyHigh
          expr: |
            histogram_quantile(0.95,
              rate(greyeye_inference_duration_seconds_bucket{stage="total"}[5m])
            ) > 1.5
          for: 5m
          labels:
            severity: critical
            team: ml
          annotations:
            summary: "Inference p95 latency exceeds 1.5s SLO"
            runbook_url: "https://wiki.greyeye.io/runbooks/inference-latency"

        - alert: InferenceErrorRateHigh
          expr: |
            rate(greyeye_inference_errors_total[5m])
            / (rate(greyeye_inference_frames_total[5m]) + 1e-10) > 0.05
          for: 5m
          labels:
            severity: critical
            team: ml
          annotations:
            summary: "Inference error rate >5%"

        - alert: InferenceWorkerDown
          expr: up{job=~".*inference-worker.*"} == 0
          for: 3m
          labels:
            severity: critical
            team: platform
          annotations:
            summary: "Inference worker is down"

        - alert: InferenceQueueDepthHigh
          expr: greyeye_inference_queue_depth > 50
          for: 5m
          labels:
            severity: warning
            team: ml
          annotations:
            summary: "Inference queue depth >50"

    - name: greyeye-api
      interval: 30s
      rules:
        - alert: APIErrorRate5xx
          expr: |
            rate(http_requests_total{status=~"5.."}[5m])
            / (rate(http_requests_total[5m]) + 1e-10) > 0.01
          for: 5m
          labels:
            severity: critical
            team: platform
          annotations:
            summary: "5xx error rate >1%"

        - alert: APIServiceDown
          expr: up{job=~"greyeye-.*"} == 0
          for: 3m
          labels:
            severity: critical
            team: platform
          annotations:
            summary: "Service is down"

        - alert: LiveKPIRefreshSlow
          expr: |
            histogram_quantile(0.95,
              rate(greyeye_live_kpi_push_duration_seconds_bucket[5m])
            ) > 2.0
          for: 5m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "Live KPI refresh p95 >2s SLO"

    - name: greyeye-nats
      interval: 30s
      rules:
        - alert: NATSConsumerPendingCritical
          expr: nats_consumer_num_pending > 50000
          for: 5m
          labels:
            severity: critical
            team: platform
          annotations:
            summary: "NATS consumer backlog critical"

        - alert: NATSDLQMessages
          expr: increase(nats_stream_messages{stream=~".*DLQ.*"}[15m]) > 0
          for: 1m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "Messages arriving in DLQ"

    - name: greyeye-pods
      interval: 30s
      rules:
        - alert: PodCrashLooping
          expr: rate(kube_pod_container_status_restarts_total{namespace=~"greyeye-.*"}[15m]) > 0
          for: 15m
          labels:
            severity: critical
            team: platform
          annotations:
            summary: "Pod is crash-looping"

        - alert: HPAMaxedOut
          expr: |
            kube_horizontalpodautoscaler_status_current_replicas{namespace=~"greyeye-.*"}
            == kube_horizontalpodautoscaler_spec_max_replicas{namespace=~"greyeye-.*"}
          for: 15m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "HPA at max replicas"

    - name: greyeye-cameras
      interval: 1m
      rules:
        - alert: CameraOffline
          expr: (time() - greyeye_camera_last_heartbeat_timestamp) > 300
          for: 5m
          labels:
            severity: warning
            team: operations
          annotations:
            summary: "Camera offline (>5 min since heartbeat)"

        - alert: IngestBackpressure
          expr: rate(greyeye_ingest_rejected_total{reason="backpressure"}[5m]) > 0
          for: 2m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "Ingest service applying backpressure"
{{- end }}
