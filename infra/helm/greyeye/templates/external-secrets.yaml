{{- if .Values.externalSecrets.enabled }}
###############################################################################
# External Secrets (SEC-6)
#
# Uses the External Secrets Operator to sync secrets from AWS Secrets Manager
# into Kubernetes Secrets. Each service gets only the secrets it needs.
###############################################################################

# ── SecretStore: AWS Secrets Manager ─────────────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: greyeye-aws-secrets
  labels:
    app.kubernetes.io/part-of: greyeye
spec:
  provider:
    aws:
      service: SecretsManager
      region: {{ .Values.externalSecrets.awsRegion | default "ap-northeast-2" }}
      {{- if .Values.externalSecrets.roleArn }}
      role: {{ .Values.externalSecrets.roleArn }}
      {{- end }}
---
# ── Database Credentials ────────────────────────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: greyeye-db-credentials
  namespace: greyeye-api
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: greyeye-aws-secrets
    kind: ClusterSecretStore
  target:
    name: greyeye-db-credentials
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: {{ .Values.externalSecrets.secretPrefix }}/database
        property: username
    - secretKey: password
      remoteRef:
        key: {{ .Values.externalSecrets.secretPrefix }}/database
        property: password
    - secretKey: connection-string
      remoteRef:
        key: {{ .Values.externalSecrets.secretPrefix }}/database
        property: connection_string
---
# ── JWT Signing Key ─────────────────────────────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: greyeye-jwt-secret
  namespace: greyeye-api
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: greyeye-aws-secrets
    kind: ClusterSecretStore
  target:
    name: greyeye-jwt-secret
    creationPolicy: Owner
  data:
    - secretKey: jwt-secret
      remoteRef:
        key: {{ .Values.externalSecrets.secretPrefix }}/jwt
        property: signing_key
---
# ── S3 Credentials ──────────────────────────────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: greyeye-s3-credentials
  namespace: greyeye-processing
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: greyeye-aws-secrets
    kind: ClusterSecretStore
  target:
    name: greyeye-s3-credentials
    creationPolicy: Owner
  data:
    - secretKey: access-key
      remoteRef:
        key: {{ .Values.externalSecrets.secretPrefix }}/s3
        property: access_key
    - secretKey: secret-key
      remoteRef:
        key: {{ .Values.externalSecrets.secretPrefix }}/s3
        property: secret_key
---
# ── Supabase Credentials ────────────────────────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: greyeye-supabase-credentials
  namespace: greyeye-api
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: greyeye-aws-secrets
    kind: ClusterSecretStore
  target:
    name: greyeye-supabase-credentials
    creationPolicy: Owner
  data:
    - secretKey: service-role-key
      remoteRef:
        key: {{ .Values.externalSecrets.secretPrefix }}/supabase
        property: service_role_key
---
# ── Application Encryption Keys (Fernet) ────────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: greyeye-encryption-keys
  namespace: greyeye-api
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: greyeye-aws-secrets
    kind: ClusterSecretStore
  target:
    name: greyeye-encryption-keys
    creationPolicy: Owner
  data:
    - secretKey: keys
      remoteRef:
        key: {{ .Values.externalSecrets.secretPrefix }}/encryption
        property: fernet_keys
---
# ── SMTP Credentials (Notification Service) ─────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: greyeye-smtp-credentials
  namespace: greyeye-api
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: greyeye-aws-secrets
    kind: ClusterSecretStore
  target:
    name: greyeye-smtp-credentials
    creationPolicy: Owner
  data:
    - secretKey: host
      remoteRef:
        key: {{ .Values.externalSecrets.secretPrefix }}/smtp
        property: host
    - secretKey: username
      remoteRef:
        key: {{ .Values.externalSecrets.secretPrefix }}/smtp
        property: username
    - secretKey: password
      remoteRef:
        key: {{ .Values.externalSecrets.secretPrefix }}/smtp
        property: password
{{- end }}
