###############################################################################
# GreyEye — Umbrella Chart Default Values
###############################################################################

global:
  imageRegistry: ""
  imagePullSecrets: []

  postgresql:
    host: greyeye-postgres
    port: 5432
    database: greyeye
    existingSecret: greyeye-db-credentials
    secretKeys:
      username: username
      password: password

  redis:
    host: greyeye-redis
    port: 6379

  nats:
    url: nats://greyeye-nats:4222

  s3:
    endpoint: http://greyeye-minio:9000
    bucketFrames: greyeye-frames
    bucketExports: greyeye-exports
    bucketModels: greyeye-models
    bucketHardExamples: greyeye-hard-examples
    existingSecret: greyeye-s3-credentials

  supabase:
    url: ""
    existingSecret: greyeye-supabase-credentials

  jwt:
    existingSecret: greyeye-jwt-secret

  observability:
    logLevel: INFO
    jsonLogs: "true"
    tracingEnabled: "true"
    otlpEndpoint: "http://greyeye-tempo:4317"

# ── Per-service overrides ────────────────────────────────────────────────────

api-gateway:
  enabled: true

auth-service:
  enabled: true

config-service:
  enabled: true

ingest-service:
  enabled: true

inference-worker:
  enabled: true

aggregator:
  enabled: true

reporting-api:
  enabled: true

notification-service:
  enabled: true

pgbackrest:
  enabled: false

# ── Alerting (Phase 6) ─────────────────────────────────────────────────────

prometheusRules:
  enabled: false

# ── Security (Phase 6) ─────────────────────────────────────────────────────

networkPolicies:
  enabled: false

externalSecrets:
  enabled: false
  awsRegion: ap-northeast-2
  roleArn: ""
  secretPrefix: "greyeye/production"

podSecurity:
  enabled: false
