###############################################################################
# GreyEye — Production Values Override
#
# Usage:
#   helm install greyeye ./infra/helm/greyeye \
#     -f ./infra/helm/greyeye/values-production.yaml \
#     --set global.supabase.url=https://xxx.supabase.co
###############################################################################

global:
  imageRegistry: "ghcr.io/greyeye"

  postgresql:
    host: greyeye-postgres-rw.greyeye-data.svc
    port: 5432
    database: greyeye

  redis:
    host: greyeye-redis-master.greyeye-data.svc
    port: 6379

  nats:
    url: nats://greyeye-nats.greyeye-data.svc:4222

  s3:
    endpoint: https://s3.ap-northeast-2.amazonaws.com
    bucketFrames: greyeye-frames-prod
    bucketExports: greyeye-exports-prod
    bucketModels: greyeye-models-prod
    bucketHardExamples: greyeye-hard-examples-prod

# ── API Gateway ──────────────────────────────────────────────────────────────
api-gateway:
  replicaCount: 3
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 65
  env:
    TLS_ENABLED: "true"
  resources:
    requests:
      memory: 256Mi
      cpu: 200m
    limits:
      memory: 512Mi
      cpu: 500m

# ── Auth Service ─────────────────────────────────────────────────────────────
auth-service:
  replicaCount: 3
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 65
  resources:
    requests:
      memory: 512Mi
      cpu: 500m
    limits:
      memory: 1Gi
      cpu: 1000m

# ── Config Service ───────────────────────────────────────────────────────────
config-service:
  replicaCount: 2
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70

# ── Ingest Service ───────────────────────────────────────────────────────────
ingest-service:
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 15
    targetCPUUtilizationPercentage: 60
  resources:
    requests:
      memory: 512Mi
      cpu: 500m
    limits:
      memory: 1Gi
      cpu: 1000m

# ── Inference Worker ─────────────────────────────────────────────────────────
inference-worker:
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 20
  gpu:
    enabled: true
  resources:
    requests:
      memory: 4Gi
      cpu: 2000m
      nvidia.com/gpu: "1"
    limits:
      memory: 8Gi
      cpu: 4000m
      nvidia.com/gpu: "1"
  modelVolume:
    enabled: true
    storageClass: gp3
    size: 10Gi

# ── Aggregator ───────────────────────────────────────────────────────────────
aggregator:
  replicaCount: 3
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 8
    targetCPUUtilizationPercentage: 65
  resources:
    requests:
      memory: 512Mi
      cpu: 500m
    limits:
      memory: 1Gi
      cpu: 1000m

# ── Reporting API ────────────────────────────────────────────────────────────
reporting-api:
  replicaCount: 3
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 12
    targetCPUUtilizationPercentage: 65
  resources:
    requests:
      memory: 512Mi
      cpu: 500m
    limits:
      memory: 2Gi
      cpu: 1000m

# ── Notification Service ────────────────────────────────────────────────────
notification-service:
  replicaCount: 2
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70

# ── Alerting ──────────────────────────────────────────────────────────────
prometheusRules:
  enabled: true

# ── pgBackRest Backup ──────────────────────────────────────────────────────
pgbackrest:
  enabled: true
  postgresql:
    host: greyeye-postgres-rw.greyeye-data.svc
    user: greyeye_admin
  s3:
    bucket: greyeye-production-backups
    region: ap-northeast-2
  schedule:
    full: "0 2 * * *"
    differential: "0 */6 * * *"
  retention:
    full: 30
    differential: 7
  resources:
    requests:
      memory: 1Gi
      cpu: 500m
    limits:
      memory: 4Gi
      cpu: 2000m
