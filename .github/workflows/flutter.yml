###############################################################################
# GreyEye — Flutter Mobile App CI
#
# Runs analysis, tests, and builds for the Flutter mobile application.
# Produces APK/IPA artifacts on main branch pushes.
###############################################################################

name: Flutter

on:
  push:
    branches: [main]
    paths:
      - "apps/mobile_flutter/**"
      - ".github/workflows/flutter.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/mobile_flutter/**"
      - ".github/workflows/flutter.yml"

concurrency:
  group: flutter-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: apps/mobile_flutter

env:
  FLUTTER_VERSION: "3.24.0"

jobs:
  # ── Analyze ────────────────────────────────────────────────────────────────
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Format check
        run: dart format --set-exit-if-changed lib/ test/

  # ── Test ───────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run tests
        run: flutter test --coverage --reporter=json > test-results.json || true

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-coverage
          path: apps/mobile_flutter/coverage/lcov.info
          retention-days: 14

  # ── Build Android ──────────────────────────────────────────────────────────
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK
        run: flutter build apk --release --dart-define=ENV=staging

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: apps/mobile_flutter/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  # ── Build iOS ──────────────────────────────────────────────────────────────
  build-ios:
    name: Build iOS
    runs-on: macos-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign --dart-define=ENV=staging

      - name: Upload iOS build
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: apps/mobile_flutter/build/ios/iphoneos/Runner.app
          retention-days: 30
