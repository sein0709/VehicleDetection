###############################################################################
# GreyEye — Production Launch Orchestrator
#
# End-to-end production launch: rolling deploy, canary ML models, extended
# smoke tests, alerting verification, and burn-in kickoff. Follows the
# runbook at infra/runbooks/production-launch.md.
###############################################################################

name: Production Launch

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Service image tag (short SHA)"
        required: true
        type: string
      detector_model_version:
        description: "Detector model version (e.g. detector-v1.0.0)"
        required: true
        type: string
      detector_model_s3_path:
        description: "S3 path to detector ONNX model"
        required: true
        type: string
      classifier_model_version:
        description: "Classifier model version (e.g. classifier-v1.0.0)"
        required: true
        type: string
      classifier_model_s3_path:
        description: "S3 path to classifier ONNX model"
        required: true
        type: string
      burn_in_hours:
        description: "Burn-in duration in hours"
        required: false
        type: number
        default: 24
      skip_canary:
        description: "Skip canary model deploy (models already deployed)"
        required: false
        type: boolean
        default: false

concurrency:
  group: production-launch
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io/greyeye
  HELM_RELEASE: greyeye
  HELM_CHART: infra/helm/greyeye
  K8S_NAMESPACE: greyeye-production
  AWS_REGION: ap-northeast-2

permissions:
  contents: read
  packages: read
  id-token: write
  actions: write

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # Phase 1: Pre-Flight Checks
  # ════════════════════════════════════════════════════════════════════════════
  preflight:
    name: Pre-Flight Checks
    runs-on: ubuntu-latest
    environment:
      name: production
    outputs:
      previous_revision: ${{ steps.revision.outputs.rev }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_PRODUCTION }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name greyeye-production --region ${{ env.AWS_REGION }}

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint ${{ env.HELM_CHART }} -f ${{ env.HELM_CHART }}/values-production.yaml

      - name: Verify images exist
        run: |
          SERVICES=(auth_service config_service ingest_service inference_worker aggregator reporting_api notification_service api_gateway)
          MISSING=0
          for svc in "${SERVICES[@]}"; do
            echo -n "  ${svc}:${{ inputs.image_tag }} ... "
            if docker manifest inspect "${{ env.REGISTRY }}/${svc}:${{ inputs.image_tag }}" > /dev/null 2>&1; then
              echo "✓"
            else
              echo "✗ NOT FOUND"
              MISSING=$((MISSING + 1))
            fi
          done
          if [[ "$MISSING" -gt 0 ]]; then
            echo "::error::${MISSING} images missing from registry."
            exit 1
          fi

      - name: Verify model artifacts
        if: inputs.skip_canary == false
        run: |
          echo "Checking detector model..."
          aws s3 ls "${{ inputs.detector_model_s3_path }}" || {
            echo "::error::Detector model not found"; exit 1
          }
          echo "Checking classifier model..."
          aws s3 ls "${{ inputs.classifier_model_s3_path }}" || {
            echo "::error::Classifier model not found"; exit 1
          }
          echo "All model artifacts verified."

      - name: Capture current revision
        id: revision
        run: |
          REV=$(helm history ${{ env.HELM_RELEASE }} \
            --namespace ${{ env.K8S_NAMESPACE }} \
            --max 1 -o json 2>/dev/null \
            | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['revision'])" 2>/dev/null || echo "0")
          echo "rev=${REV}" >> "$GITHUB_OUTPUT"
          echo "Current Helm revision: ${REV}"

      - name: Verify cluster health
        run: |
          echo "── Node Status ──"
          kubectl get nodes -o wide
          echo ""
          echo "── GPU Nodes ──"
          kubectl get nodes -l nvidia.com/gpu.present=true --no-headers | wc -l | xargs echo "GPU nodes:"
          echo ""
          echo "── Namespace Status ──"
          kubectl get ns greyeye-production 2>/dev/null && echo "Namespace exists" || echo "Will be created"

      - name: Notify launch started
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [[ -n "${SLACK_WEBHOOK_URL}" ]]; then
            curl -sf -X POST "${SLACK_WEBHOOK_URL}" \
              -H "Content-Type: application/json" \
              -d "{\"text\":\":rocket: *Production Launch Started*\nImage: \`${{ inputs.image_tag }}\`\nDetector: \`${{ inputs.detector_model_version }}\`\nClassifier: \`${{ inputs.classifier_model_version }}\`\nBurn-in: ${{ inputs.burn_in_hours }}h\"}" || true
          fi

  # ════════════════════════════════════════════════════════════════════════════
  # Phase 2: Rolling Deploy
  # ════════════════════════════════════════════════════════════════════════════
  deploy:
    name: Rolling Deploy
    runs-on: ubuntu-latest
    needs: preflight
    environment:
      name: production
      url: https://api.greyeye.io/healthz
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_PRODUCTION }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name greyeye-production --region ${{ env.AWS_REGION }}

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Helm dependency update
        run: helm dependency update ${{ env.HELM_CHART }}

      - name: Deploy to production
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE }} ${{ env.HELM_CHART }} \
            --namespace ${{ env.K8S_NAMESPACE }} \
            --create-namespace \
            -f ${{ env.HELM_CHART }}/values-production.yaml \
            --set global.imageTag="${{ inputs.image_tag }}" \
            --wait \
            --timeout 15m \
            --atomic

      - name: Verify rollout
        run: |
          SERVICES=(api-gateway auth-service config-service ingest-service inference-worker aggregator reporting-api notification-service)
          for svc in "${SERVICES[@]}"; do
            echo "Verifying ${svc}..."
            kubectl rollout status deployment/greyeye-${svc} \
              --namespace ${{ env.K8S_NAMESPACE }} \
              --timeout=5m
          done
          echo ""
          echo "All deployments rolled out successfully."

      - name: Wait for stabilisation
        run: |
          echo "Waiting 60s for services to stabilise..."
          sleep 60

  # ════════════════════════════════════════════════════════════════════════════
  # Phase 3: Post-Deploy Smoke Tests
  # ════════════════════════════════════════════════════════════════════════════
  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v4

      - name: Run comprehensive smoke tests
        env:
          API_BASE_URL: https://api.greyeye.io
          SMOKE_TEST_PASSWORD: ${{ secrets.SMOKE_TEST_PASSWORD }}
          CLEANUP: "true"
        run: bash infra/scripts/production-smoke-test.sh

      - name: Rollback on failure
        if: failure()
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          aws-actions/configure-aws-credentials@v4 || true
          aws eks update-kubeconfig --name greyeye-production --region ${{ env.AWS_REGION }} || true
          echo "::error::Smoke tests failed — rolling back."
          helm rollback ${{ env.HELM_RELEASE }} \
            --namespace ${{ env.K8S_NAMESPACE }} \
            --wait --timeout 10m || true

  # ════════════════════════════════════════════════════════════════════════════
  # Phase 4: Canary ML Model Deploy
  # ════════════════════════════════════════════════════════════════════════════
  canary-detector:
    name: "Canary: Detector"
    runs-on: ubuntu-latest
    needs: smoke-test
    if: inputs.skip_canary == false
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_PRODUCTION }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name greyeye-production --region ${{ env.AWS_REGION }}

      - name: Deploy detector canary (10%)
        run: |
          kubectl create configmap model-canary-detector \
            --namespace ${{ env.K8S_NAMESPACE }} \
            --from-literal=model_version="${{ inputs.detector_model_version }}" \
            --from-literal=model_s3_path="${{ inputs.detector_model_s3_path }}" \
            --from-literal=canary_weight="10" \
            --from-literal=model_type="detector" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl set env deployment/greyeye-inference-worker \
            --namespace ${{ env.K8S_NAMESPACE }} \
            CANARY_MODEL_VERSION="${{ inputs.detector_model_version }}" \
            CANARY_MODEL_S3_PATH="${{ inputs.detector_model_s3_path }}" \
            CANARY_MODEL_TYPE="detector" \
            CANARY_WEIGHT="10"

      - name: Monitor 10% (5 min)
        run: |
          for i in $(seq 1 5); do
            echo "── Check ${i}/5 ──"
            RESTARTS=$(kubectl get pods -n ${{ env.K8S_NAMESPACE }} -l app=inference-worker \
              -o jsonpath='{range .items[*]}{.status.containerStatuses[0].restartCount}{"\n"}{end}' 2>/dev/null \
              | awk '{s+=$1} END {print s+0}')
            echo "Restarts: ${RESTARTS}"
            [[ "$RESTARTS" -gt 3 ]] && { echo "::error::Excessive restarts"; exit 1; }
            sleep 60
          done

      - name: Scale to 50%
        run: |
          kubectl set env deployment/greyeye-inference-worker \
            --namespace ${{ env.K8S_NAMESPACE }} CANARY_WEIGHT="50"
          kubectl patch configmap model-canary-detector \
            --namespace ${{ env.K8S_NAMESPACE }} \
            --type merge -p '{"data":{"canary_weight":"50"}}'

      - name: Monitor 50% (5 min)
        run: |
          for i in $(seq 1 5); do
            echo "── Check ${i}/5 ──"
            RESTARTS=$(kubectl get pods -n ${{ env.K8S_NAMESPACE }} -l app=inference-worker \
              -o jsonpath='{range .items[*]}{.status.containerStatuses[0].restartCount}{"\n"}{end}' 2>/dev/null \
              | awk '{s+=$1} END {print s+0}')
            echo "Restarts: ${RESTARTS}"
            [[ "$RESTARTS" -gt 5 ]] && { echo "::error::Excessive restarts at 50%"; exit 1; }
            sleep 60
          done

      - name: Promote to 100%
        run: |
          kubectl set env deployment/greyeye-inference-worker \
            --namespace ${{ env.K8S_NAMESPACE }} \
            MODEL_VERSION="${{ inputs.detector_model_version }}" \
            MODEL_S3_PATH="${{ inputs.detector_model_s3_path }}" \
            MODEL_TYPE="detector" \
            CANARY_WEIGHT- CANARY_MODEL_VERSION- CANARY_MODEL_S3_PATH- CANARY_MODEL_TYPE-

          kubectl delete configmap model-canary-detector \
            --namespace ${{ env.K8S_NAMESPACE }} --ignore-not-found

          kubectl rollout restart deployment/greyeye-inference-worker \
            --namespace ${{ env.K8S_NAMESPACE }}
          kubectl rollout status deployment/greyeye-inference-worker \
            --namespace ${{ env.K8S_NAMESPACE }} --timeout=10m

          echo "Detector model ${{ inputs.detector_model_version }} fully deployed."

  canary-classifier:
    name: "Canary: Classifier"
    runs-on: ubuntu-latest
    needs: canary-detector
    if: inputs.skip_canary == false
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_PRODUCTION }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name greyeye-production --region ${{ env.AWS_REGION }}

      - name: Deploy classifier canary (10%)
        run: |
          kubectl create configmap model-canary-classifier \
            --namespace ${{ env.K8S_NAMESPACE }} \
            --from-literal=model_version="${{ inputs.classifier_model_version }}" \
            --from-literal=model_s3_path="${{ inputs.classifier_model_s3_path }}" \
            --from-literal=canary_weight="10" \
            --from-literal=model_type="classifier" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl set env deployment/greyeye-inference-worker \
            --namespace ${{ env.K8S_NAMESPACE }} \
            CANARY_MODEL_VERSION="${{ inputs.classifier_model_version }}" \
            CANARY_MODEL_S3_PATH="${{ inputs.classifier_model_s3_path }}" \
            CANARY_MODEL_TYPE="classifier" \
            CANARY_WEIGHT="10"

      - name: Monitor 10% (5 min)
        run: |
          for i in $(seq 1 5); do
            echo "── Check ${i}/5 ──"
            RESTARTS=$(kubectl get pods -n ${{ env.K8S_NAMESPACE }} -l app=inference-worker \
              -o jsonpath='{range .items[*]}{.status.containerStatuses[0].restartCount}{"\n"}{end}' 2>/dev/null \
              | awk '{s+=$1} END {print s+0}')
            echo "Restarts: ${RESTARTS}"
            [[ "$RESTARTS" -gt 3 ]] && { echo "::error::Excessive restarts"; exit 1; }
            sleep 60
          done

      - name: Scale to 50%
        run: |
          kubectl set env deployment/greyeye-inference-worker \
            --namespace ${{ env.K8S_NAMESPACE }} CANARY_WEIGHT="50"
          kubectl patch configmap model-canary-classifier \
            --namespace ${{ env.K8S_NAMESPACE }} \
            --type merge -p '{"data":{"canary_weight":"50"}}'

      - name: Monitor 50% (5 min)
        run: |
          for i in $(seq 1 5); do
            echo "── Check ${i}/5 ──"
            RESTARTS=$(kubectl get pods -n ${{ env.K8S_NAMESPACE }} -l app=inference-worker \
              -o jsonpath='{range .items[*]}{.status.containerStatuses[0].restartCount}{"\n"}{end}' 2>/dev/null \
              | awk '{s+=$1} END {print s+0}')
            echo "Restarts: ${RESTARTS}"
            [[ "$RESTARTS" -gt 5 ]] && { echo "::error::Excessive restarts at 50%"; exit 1; }
            sleep 60
          done

      - name: Promote to 100%
        run: |
          kubectl set env deployment/greyeye-inference-worker \
            --namespace ${{ env.K8S_NAMESPACE }} \
            CLASSIFIER_MODEL_VERSION="${{ inputs.classifier_model_version }}" \
            CLASSIFIER_MODEL_S3_PATH="${{ inputs.classifier_model_s3_path }}" \
            CANARY_WEIGHT- CANARY_MODEL_VERSION- CANARY_MODEL_S3_PATH- CANARY_MODEL_TYPE-

          kubectl delete configmap model-canary-classifier \
            --namespace ${{ env.K8S_NAMESPACE }} --ignore-not-found

          kubectl rollout restart deployment/greyeye-inference-worker \
            --namespace ${{ env.K8S_NAMESPACE }}
          kubectl rollout status deployment/greyeye-inference-worker \
            --namespace ${{ env.K8S_NAMESPACE }} --timeout=10m

          echo "Classifier model ${{ inputs.classifier_model_version }} fully deployed."

  # ════════════════════════════════════════════════════════════════════════════
  # Phase 5: Verify Alerting
  # ════════════════════════════════════════════════════════════════════════════
  verify-alerting:
    name: Verify Alerting
    runs-on: ubuntu-latest
    needs: [smoke-test, canary-classifier]
    if: always() && needs.smoke-test.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Check Prometheus rules loaded
        run: |
          echo "Querying Prometheus for loaded rule groups..."
          RULES=$(curl -sf --max-time 15 "https://prometheus.greyeye.io/api/v1/rules" 2>/dev/null || echo '{"data":{"groups":[]}}')
          GROUP_COUNT=$(echo "$RULES" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          groups = data.get('data', {}).get('groups', [])
          print(len(groups))
          for g in groups:
              print(f'  - {g[\"name\"]}: {len(g[\"rules\"])} rules')
          " 2>/dev/null || echo "0")
          echo "Rule groups loaded: ${GROUP_COUNT}"

      - name: Check Alertmanager health
        run: |
          STATUS=$(curl -so /dev/null -w "%{http_code}" --max-time 10 \
            "https://alertmanager.greyeye.io/-/healthy" 2>/dev/null || echo "000")
          echo "Alertmanager health: ${STATUS}"
          [[ "$STATUS" == "200" ]] || echo "::warning::Alertmanager may not be reachable externally"

      - name: Verify no critical alerts firing
        run: |
          ALERTS=$(curl -sf --max-time 15 "https://prometheus.greyeye.io/api/v1/alerts" 2>/dev/null || echo '{"data":{"alerts":[]}}')
          CRITICAL=$(echo "$ALERTS" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          alerts = data.get('data', {}).get('alerts', [])
          critical = [a for a in alerts if a.get('labels', {}).get('severity') == 'critical' and a.get('state') == 'firing']
          print(len(critical))
          for a in critical:
              print(f'  FIRING: {a[\"labels\"].get(\"alertname\", \"unknown\")}')
          " 2>/dev/null || echo "0")
          echo "Critical alerts firing: ${CRITICAL}"
          if [[ "$CRITICAL" -gt 0 ]]; then
            echo "::warning::Critical alerts are firing — investigate before proceeding."
          fi

  # ════════════════════════════════════════════════════════════════════════════
  # Phase 6: Kick Off Burn-In
  # ════════════════════════════════════════════════════════════════════════════
  start-burn-in:
    name: Start Burn-In
    runs-on: ubuntu-latest
    needs: verify-alerting
    steps:
      - name: Trigger burn-in workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run burn-in.yml \
            --repo "${{ github.repository }}" \
            -f duration_hours=${{ inputs.burn_in_hours }} \
            -f interval_minutes=15
          echo "Burn-in monitor started for ${{ inputs.burn_in_hours }}h."

      - name: Notify launch phase complete
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [[ -n "${SLACK_WEBHOOK_URL}" ]]; then
            curl -sf -X POST "${SLACK_WEBHOOK_URL}" \
              -H "Content-Type: application/json" \
              -d "{\"text\":\":white_check_mark: *Production Launch — Deploy Phase Complete*\nServices: \`${{ inputs.image_tag }}\`\nDetector: \`${{ inputs.detector_model_version }}\`\nClassifier: \`${{ inputs.classifier_model_version }}\`\n\n:hourglass: Burn-in monitor running for ${{ inputs.burn_in_hours }}h. Check #greyeye-alerts for updates.\"}" || true
          fi

  # ════════════════════════════════════════════════════════════════════════════
  # Rollback (on any failure)
  # ════════════════════════════════════════════════════════════════════════════
  rollback:
    name: Emergency Rollback
    runs-on: ubuntu-latest
    needs: [deploy, smoke-test, canary-detector, canary-classifier]
    if: failure()
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_PRODUCTION }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name greyeye-production --region ${{ env.AWS_REGION }}

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Rollback services
        run: |
          echo "::error::Production launch failed — initiating rollback."
          helm rollback ${{ env.HELM_RELEASE }} \
            --namespace ${{ env.K8S_NAMESPACE }} \
            --wait --timeout 10m || true

      - name: Clean up canary configs
        run: |
          kubectl set env deployment/greyeye-inference-worker \
            --namespace ${{ env.K8S_NAMESPACE }} \
            CANARY_WEIGHT- CANARY_MODEL_VERSION- CANARY_MODEL_S3_PATH- CANARY_MODEL_TYPE- || true

          kubectl delete configmap model-canary-detector \
            --namespace ${{ env.K8S_NAMESPACE }} --ignore-not-found || true
          kubectl delete configmap model-canary-classifier \
            --namespace ${{ env.K8S_NAMESPACE }} --ignore-not-found || true

          kubectl rollout restart deployment/greyeye-inference-worker \
            --namespace ${{ env.K8S_NAMESPACE }} || true

      - name: Notify rollback
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [[ -n "${SLACK_WEBHOOK_URL}" ]]; then
            curl -sf -X POST "${SLACK_WEBHOOK_URL}" \
              -H "Content-Type: application/json" \
              -d "{\"text\":\":rotating_light: *Production Launch ROLLED BACK*\nImage: \`${{ inputs.image_tag }}\`\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\n\nInvestigate and retry after fixing the issue.\"}" || true
          fi
