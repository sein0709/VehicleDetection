###############################################################################
# GreyEye — Deploy to Production
#
# Manual workflow triggered after staging smoke tests pass. Requires approval
# from the production environment protection rule. Performs a rolling update
# with automatic rollback on failure.
###############################################################################

name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (short SHA, e.g. a1b2c3d)"
        required: true
        type: string
      dry_run:
        description: "Dry-run mode (template only, no deploy)"
        required: false
        type: boolean
        default: false

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io/greyeye
  HELM_RELEASE: greyeye
  HELM_CHART: infra/helm/greyeye
  K8S_NAMESPACE: greyeye-production
  AWS_REGION: ap-northeast-2

permissions:
  contents: read
  packages: read
  id-token: write

jobs:
  # ── Approval Gate ──────────────────────────────────────────────────────────
  approve:
    name: Production Approval
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Approved
        run: echo "Production deploy approved for tag ${{ inputs.image_tag }}"

  # ── Pre-deploy Validation ──────────────────────────────────────────────────
  validate:
    name: Pre-deploy Checks
    runs-on: ubuntu-latest
    needs: approve
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint ${{ env.HELM_CHART }} -f ${{ env.HELM_CHART }}/values-production.yaml

      - name: Helm template (dry-run)
        run: |
          helm dependency update ${{ env.HELM_CHART }}
          helm template ${{ env.HELM_RELEASE }} ${{ env.HELM_CHART }} \
            -f ${{ env.HELM_CHART }}/values-production.yaml \
            --set global.imageTag="${{ inputs.image_tag }}" \
            --namespace ${{ env.K8S_NAMESPACE }} > /dev/null
          echo "Template rendered successfully."

      - name: Verify image exists
        run: |
          SERVICES=(auth_service config_service ingest_service inference_worker aggregator reporting_api notification_service api_gateway)
          for svc in "${SERVICES[@]}"; do
            echo "Checking ${{ env.REGISTRY }}/${svc}:${{ inputs.image_tag }}..."
            docker manifest inspect "${{ env.REGISTRY }}/${svc}:${{ inputs.image_tag }}" > /dev/null 2>&1 \
              && echo "  ✓ Found" \
              || echo "  ⚠ Not found (may need GHCR auth)"
          done

  # ── Deploy ─────────────────────────────────────────────────────────────────
  deploy:
    name: Rolling Deploy
    runs-on: ubuntu-latest
    needs: validate
    if: inputs.dry_run == false
    environment:
      name: production
      url: https://api.greyeye.io/healthz
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_PRODUCTION }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name greyeye-production --region ${{ env.AWS_REGION }}

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Capture current revision
        id: pre_deploy
        run: |
          REV=$(helm history ${{ env.HELM_RELEASE }} \
            --namespace ${{ env.K8S_NAMESPACE }} \
            --max 1 -o json 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['revision'])" 2>/dev/null || echo "0")
          echo "revision=${REV}" >> "$GITHUB_OUTPUT"
          echo "Pre-deploy revision: ${REV}"

      - name: Helm dependency update
        run: helm dependency update ${{ env.HELM_CHART }}

      - name: Deploy to production
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE }} ${{ env.HELM_CHART }} \
            --namespace ${{ env.K8S_NAMESPACE }} \
            --create-namespace \
            -f ${{ env.HELM_CHART }}/values-production.yaml \
            --set global.imageTag="${{ inputs.image_tag }}" \
            --wait \
            --timeout 15m \
            --atomic

      - name: Verify rollout
        run: |
          SERVICES=(api-gateway auth-service config-service ingest-service inference-worker aggregator reporting-api notification-service)
          for svc in "${SERVICES[@]}"; do
            echo "Checking deployment: ${svc}..."
            kubectl rollout status deployment/${HELM_RELEASE}-${svc} \
              --namespace ${{ env.K8S_NAMESPACE }} \
              --timeout=5m
          done

  # ── Post-deploy Smoke Tests ────────────────────────────────────────────────
  smoke-test:
    name: Production Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v4

      - name: Wait for services to stabilize
        run: sleep 30

      - name: Run smoke tests
        uses: ./.github/actions/smoke-test
        with:
          api_base_url: https://api.greyeye.io
          smoke_test_password: ${{ secrets.SMOKE_TEST_PASSWORD }}
          comprehensive: "true"

      - name: Configure AWS credentials (for rollback)
        if: failure()
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_PRODUCTION }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig (for rollback)
        if: failure()
        run: aws eks update-kubeconfig --name greyeye-production --region ${{ env.AWS_REGION }}

      - name: Rollback on failure
        if: failure()
        run: |
          echo "::error::Production smoke tests failed — initiating rollback."
          helm rollback ${{ env.HELM_RELEASE }} --namespace ${{ env.K8S_NAMESPACE }} --wait --timeout 10m
