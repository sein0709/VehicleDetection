###############################################################################
# GreyEye — Load Test Pipeline
#
# Runs load tests against the staging environment after deploy, or on-demand.
# Results are uploaded as artifacts and NFR checks gate the pipeline.
###############################################################################

name: Load Tests

on:
  workflow_dispatch:
    inputs:
      scenarios:
        description: "Scenarios to run (comma-separated: mvp,scale,backpressure,latency,pipeline)"
        required: false
        default: "mvp,backpressure,latency,pipeline"
      quick:
        description: "Use reduced durations (CI smoke)"
        required: false
        type: boolean
        default: true
  workflow_run:
    workflows: ["Deploy Staging"]
    types: [completed]
    branches: [main]

concurrency:
  group: loadtest-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  UV_CACHE_DIR: /tmp/.uv-cache

permissions:
  contents: read

jobs:
  load-test:
    name: Load Tests
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: greyeye
          POSTGRES_PASSWORD: greyeye_dev
          POSTGRES_DB: greyeye
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U greyeye"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      nats:
        image: nats:2-alpine
        ports:
          - 4222:4222
          - 8222:8222
        options: >-
          --health-cmd "true"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Bootstrap NATS streams
        env:
          NATS_URL: nats://localhost:4222
        run: uv run python infra/nats_bootstrap.py

      - name: Determine scenarios
        id: scenarios
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            SCENARIOS="${{ github.event.inputs.scenarios }}"
            QUICK="${{ github.event.inputs.quick }}"
          else
            SCENARIOS="mvp,backpressure,latency,pipeline"
            QUICK="true"
          fi
          echo "scenarios=$SCENARIOS" >> $GITHUB_OUTPUT
          echo "quick=$QUICK" >> $GITHUB_OUTPUT

      - name: Run load tests
        env:
          GREYEYE_LT_INGEST_URL: http://localhost:8001
          GREYEYE_LT_REPORTING_URL: http://localhost:8003
          GREYEYE_LT_GATEWAY_URL: http://localhost:8080
          GREYEYE_LT_NATS_URL: nats://localhost:4222
          GREYEYE_LT_REDIS_URL: redis://localhost:6379/0
          GREYEYE_LT_OUTPUT_DIR: tests/loadtest/results
        run: |
          ARGS=""
          IFS=',' read -ra SCENARIOS <<< "${{ steps.scenarios.outputs.scenarios }}"
          for scenario in "${SCENARIOS[@]}"; do
            ARGS="$ARGS --${scenario}"
          done
          if [[ "${{ steps.scenarios.outputs.quick }}" == "true" ]]; then
            ARGS="$ARGS --quick"
          fi
          uv run python -m tests.loadtest.runner $ARGS \
            --output-dir tests/loadtest/results || true

      - name: Upload load test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: loadtest-results-${{ github.sha }}
          path: tests/loadtest/results/
          retention-days: 30

      - name: Check NFR gates
        run: |
          COMBINED=$(ls -t tests/loadtest/results/combined_*.json 2>/dev/null | head -1)
          if [[ -z "$COMBINED" ]]; then
            echo "::warning::No combined results found — load tests may not have run"
            exit 0
          fi
          ALL_PASSED=$(python3 -c "import json; print(json.load(open('$COMBINED'))['all_passed'])")
          if [[ "$ALL_PASSED" != "True" ]]; then
            echo "::warning::Some NFR checks failed. Review the load test results artifact."
          fi
