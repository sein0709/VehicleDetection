name: Security Scanning

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Daily scan at 06:00 UTC
    - cron: "0 6 * * *"

permissions:
  contents: read
  security-events: write

jobs:
  secret-scan:
    name: Secret Scanning (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  sast-python:
    name: SAST — Python (Bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit on services
        run: |
          bandit -r services/ libs/ \
            -c pyproject.toml \
            -f json -o bandit-report.json \
            --severity-level medium \
            || true

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

      - name: Fail on high-severity findings
        run: |
          bandit -r services/ libs/ \
            -c pyproject.toml \
            --severity-level high \
            --confidence-level high

  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit Python dependencies
        run: |
          for pyproject in services/*/pyproject.toml libs/*/pyproject.toml; do
            [ -f "$pyproject" ] || continue
            dir=$(dirname "$pyproject")
            echo "=== Scanning $dir ==="
            pip-audit -d "$dir" --output json --desc || true
          done

  container-scan:
    name: Container Scanning (Trivy)
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    strategy:
      matrix:
        service:
          - auth_service
          - config_service
          - ingest_service
          - inference_worker
          - aggregator
          - reporting_api
          - notification_service
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            -f infra/docker/Dockerfile.${{ matrix.service }} \
            -t greyeye/${{ matrix.service }}:scan \
            .

      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "greyeye/${{ matrix.service }}:scan"
          format: "sarif"
          output: "trivy-${{ matrix.service }}.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "1"

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-${{ matrix.service }}.sarif"
          category: "trivy-${{ matrix.service }}"
