###############################################################################
# GreyEye — ML Pipeline CI
#
# Validates ML training code, data converters, evaluation scripts, and
# export utilities. Runs on changes to the ml/ directory.
###############################################################################

name: ML Pipeline

on:
  push:
    branches: [main]
    paths:
      - "ml/**"
      - "libs/shared_contracts/**"
      - ".github/workflows/ml-pipeline.yml"
  pull_request:
    branches: [main]
    paths:
      - "ml/**"
      - "libs/shared_contracts/**"
      - ".github/workflows/ml-pipeline.yml"

concurrency:
  group: ml-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  UV_CACHE_DIR: /tmp/.uv-cache

jobs:
  # ── Lint ───────────────────────────────────────────────────────────────────
  lint:
    name: Lint ML Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Ruff check
        run: uv run ruff check ml/

      - name: Ruff format check
        run: uv run ruff format --check ml/

      - name: Mypy
        run: uv run mypy ml/ --ignore-missing-imports

  # ── Unit Tests ─────────────────────────────────────────────────────────────
  test:
    name: ML Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Run ML tests
        run: uv run pytest ml/ -m "not slow and not gpu" --tb=short -q --junitxml=ml-test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ml-test-results
          path: ml-test-results.xml
          retention-days: 14

  # ── Export Validation ──────────────────────────────────────────────────────
  export-validation:
    name: Export Validation
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Validate export scripts parse correctly
        run: |
          uv run python -c "
          import importlib.util, sys
          scripts = [
              'ml/export/export_detector.py',
              'ml/export/export_classifier.py',
              'ml/export/validate_export.py',
          ]
          for path in scripts:
              spec = importlib.util.spec_from_file_location('mod', path)
              if spec and spec.loader:
                  mod = importlib.util.module_from_spec(spec)
                  print(f'  ✓ {path} parses OK')
              else:
                  print(f'  ✗ {path} failed to load')
                  sys.exit(1)
          "
