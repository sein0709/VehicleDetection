###############################################################################
# GreyEye — Infrastructure CI
#
# Validates Terraform configuration and Helm charts on changes to infra/.
###############################################################################

name: Infrastructure

on:
  push:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/infrastructure.yml"
  pull_request:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/infrastructure.yml"

concurrency:
  group: infra-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Terraform ──────────────────────────────────────────────────────────────
  terraform:
    name: Terraform Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7"

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

  # ── Terraform Plan (staging) ───────────────────────────────────────────────
  terraform-plan-staging:
    name: Terraform Plan (staging)
    runs-on: ubuntu-latest
    needs: terraform
    if: github.event_name == 'pull_request'
    environment: staging
    defaults:
      run:
        working-directory: infra/terraform
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_STAGING }}
          aws-region: ap-northeast-2

      - name: Terraform init
        run: terraform init

      - name: Terraform plan
        id: plan
        run: terraform plan -var-file=envs/staging.tfvars -no-color -out=tfplan 2>&1 | tee plan-output.txt
        continue-on-error: true

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infra/terraform/plan-output.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.substring(0, 60000) + '\n... (truncated)' : plan;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Terraform Plan (staging)\n\n<details><summary>Show plan</summary>\n\n\`\`\`\n${truncated}\n\`\`\`\n\n</details>`
            });

      - name: Fail if plan errored
        if: steps.plan.outcome == 'failure'
        run: exit 1

  # ── Helm ───────────────────────────────────────────────────────────────────
  helm:
    name: Helm Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Helm lint (default)
        run: helm lint infra/helm/greyeye

      - name: Helm lint (staging)
        run: helm lint infra/helm/greyeye -f infra/helm/greyeye/values-staging.yaml

      - name: Helm lint (production)
        run: helm lint infra/helm/greyeye -f infra/helm/greyeye/values-production.yaml

      - name: Helm template (staging)
        run: |
          helm dependency update infra/helm/greyeye
          helm template greyeye infra/helm/greyeye \
            -f infra/helm/greyeye/values-staging.yaml \
            --set global.imageTag=test > /dev/null
          echo "Staging template rendered successfully."

      - name: Helm template (production)
        run: |
          helm template greyeye infra/helm/greyeye \
            -f infra/helm/greyeye/values-production.yaml \
            --set global.imageTag=test > /dev/null
          echo "Production template rendered successfully."
