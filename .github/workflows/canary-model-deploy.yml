###############################################################################
# GreyEye — Canary Model Deployment
#
# Progressively rolls out a new ML model to inference workers:
#   10% traffic -> monitor -> 50% traffic -> monitor -> 100% traffic
#
# Each stage runs evaluation metrics and can be aborted manually or
# automatically if error rates exceed thresholds.
###############################################################################

name: Canary Model Deploy

on:
  workflow_dispatch:
    inputs:
      model_version:
        description: "Model version tag (e.g. detector-v2.1.0, classifier-v1.3.0)"
        required: true
        type: string
      model_type:
        description: "Model type"
        required: true
        type: choice
        options:
          - detector
          - classifier
      model_s3_path:
        description: "S3 path to model artifact (e.g. s3://greyeye-models-prod/detector/v2.1.0/model.onnx)"
        required: true
        type: string
      target_environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - staging
          - production
      skip_staging_validation:
        description: "Skip staging validation (production only, requires prior staging success)"
        required: false
        type: boolean
        default: false

concurrency:
  group: canary-${{ inputs.target_environment }}-${{ inputs.model_type }}
  cancel-in-progress: false

env:
  AWS_REGION: ap-northeast-2

permissions:
  contents: read
  id-token: write

jobs:
  # ── Validate Model Artifact ────────────────────────────────────────────────
  validate-artifact:
    name: Validate Model
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_STAGING }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check model exists in S3
        run: |
          aws s3 ls "${{ inputs.model_s3_path }}" || {
            echo "::error::Model artifact not found at ${{ inputs.model_s3_path }}"
            exit 1
          }
          echo "Model artifact verified."

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Download and validate model
        run: |
          mkdir -p /tmp/model-validate
          aws s3 cp "${{ inputs.model_s3_path }}" /tmp/model-validate/model.onnx

          uv run python -c "
          import onnxruntime as ort
          import numpy as np

          session = ort.InferenceSession('/tmp/model-validate/model.onnx')
          inputs = session.get_inputs()
          outputs = session.get_outputs()

          print('Model inputs:')
          for inp in inputs:
              print(f'  {inp.name}: {inp.shape} ({inp.type})')
          print('Model outputs:')
          for out in outputs:
              print(f'  {out.name}: {out.shape} ({out.type})')

          input_shape = inputs[0].shape
          dummy = np.random.randn(*[d if isinstance(d, int) else 1 for d in input_shape]).astype(np.float32)
          result = session.run(None, {inputs[0].name: dummy})
          print(f'Inference OK — output shapes: {[r.shape for r in result]}')
          "

  # ── Stage 1: 10% Canary ───────────────────────────────────────────────────
  canary-10:
    name: "Canary 10%"
    runs-on: ubuntu-latest
    needs: validate-artifact
    environment:
      name: ${{ inputs.target_environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.target_environment == 'production' && secrets.AWS_ROLE_PRODUCTION || secrets.AWS_ROLE_STAGING }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          CLUSTER="greyeye-${{ inputs.target_environment }}"
          aws eks update-kubeconfig --name "${CLUSTER}" --region ${{ env.AWS_REGION }}

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Deploy canary (10%)
        run: |
          NAMESPACE="greyeye-${{ inputs.target_environment }}"

          kubectl create configmap model-canary-${{ inputs.model_type }} \
            --namespace "${NAMESPACE}" \
            --from-literal=model_version="${{ inputs.model_version }}" \
            --from-literal=model_s3_path="${{ inputs.model_s3_path }}" \
            --from-literal=canary_weight="10" \
            --from-literal=model_type="${{ inputs.model_type }}" \
            --dry-run=client -o yaml | kubectl apply -f -

          TOTAL_REPLICAS=$(kubectl get deployment greyeye-inference-worker \
            --namespace "${NAMESPACE}" -o jsonpath='{.spec.replicas}')
          CANARY_REPLICAS=$(( (TOTAL_REPLICAS * 10 + 99) / 100 ))
          [ "$CANARY_REPLICAS" -lt 1 ] && CANARY_REPLICAS=1

          kubectl set env deployment/greyeye-inference-worker \
            --namespace "${NAMESPACE}" \
            CANARY_MODEL_VERSION="${{ inputs.model_version }}" \
            CANARY_MODEL_S3_PATH="${{ inputs.model_s3_path }}" \
            CANARY_MODEL_TYPE="${{ inputs.model_type }}" \
            CANARY_WEIGHT="10"

          echo "Deployed canary at 10% (${CANARY_REPLICAS}/${TOTAL_REPLICAS} replicas)"

      - name: Monitor canary (5 min)
        run: |
          NAMESPACE="greyeye-${{ inputs.target_environment }}"
          echo "Monitoring canary for 5 minutes..."

          for i in $(seq 1 5); do
            echo ""
            echo "── Check ${i}/5 ($(date -u +%H:%M:%S)) ──"

            kubectl get pods -n "${NAMESPACE}" -l app=inference-worker --no-headers | head -5

            READY=$(kubectl get deployment greyeye-inference-worker \
              -n "${NAMESPACE}" -o jsonpath='{.status.readyReplicas}' 2>/dev/null || echo "0")
            DESIRED=$(kubectl get deployment greyeye-inference-worker \
              -n "${NAMESPACE}" -o jsonpath='{.spec.replicas}' 2>/dev/null || echo "0")
            echo "Ready: ${READY}/${DESIRED}"

            RESTARTS=$(kubectl get pods -n "${NAMESPACE}" -l app=inference-worker \
              -o jsonpath='{range .items[*]}{.status.containerStatuses[0].restartCount}{"\n"}{end}' 2>/dev/null \
              | awk '{s+=$1} END {print s+0}')
            echo "Total restarts: ${RESTARTS}"

            if [[ "$RESTARTS" -gt 3 ]]; then
              echo "::error::Excessive restarts detected (${RESTARTS}). Aborting canary."
              exit 1
            fi

            sleep 60
          done
          echo "Canary 10% monitoring passed."

  # ── Stage 2: 50% Canary ───────────────────────────────────────────────────
  canary-50:
    name: "Canary 50%"
    runs-on: ubuntu-latest
    needs: canary-10
    environment:
      name: ${{ inputs.target_environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.target_environment == 'production' && secrets.AWS_ROLE_PRODUCTION || secrets.AWS_ROLE_STAGING }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          CLUSTER="greyeye-${{ inputs.target_environment }}"
          aws eks update-kubeconfig --name "${CLUSTER}" --region ${{ env.AWS_REGION }}

      - name: Scale canary to 50%
        run: |
          NAMESPACE="greyeye-${{ inputs.target_environment }}"

          kubectl set env deployment/greyeye-inference-worker \
            --namespace "${NAMESPACE}" \
            CANARY_WEIGHT="50"

          kubectl patch configmap model-canary-${{ inputs.model_type }} \
            --namespace "${NAMESPACE}" \
            --type merge -p '{"data":{"canary_weight":"50"}}'

          echo "Canary scaled to 50%."

      - name: Monitor canary (5 min)
        run: |
          NAMESPACE="greyeye-${{ inputs.target_environment }}"
          echo "Monitoring canary at 50% for 5 minutes..."

          for i in $(seq 1 5); do
            echo ""
            echo "── Check ${i}/5 ($(date -u +%H:%M:%S)) ──"

            READY=$(kubectl get deployment greyeye-inference-worker \
              -n "${NAMESPACE}" -o jsonpath='{.status.readyReplicas}' 2>/dev/null || echo "0")
            DESIRED=$(kubectl get deployment greyeye-inference-worker \
              -n "${NAMESPACE}" -o jsonpath='{.spec.replicas}' 2>/dev/null || echo "0")
            echo "Ready: ${READY}/${DESIRED}"

            RESTARTS=$(kubectl get pods -n "${NAMESPACE}" -l app=inference-worker \
              -o jsonpath='{range .items[*]}{.status.containerStatuses[0].restartCount}{"\n"}{end}' 2>/dev/null \
              | awk '{s+=$1} END {print s+0}')
            echo "Total restarts: ${RESTARTS}"

            if [[ "$RESTARTS" -gt 5 ]]; then
              echo "::error::Excessive restarts at 50% canary. Aborting."
              exit 1
            fi

            sleep 60
          done
          echo "Canary 50% monitoring passed."

  # ── Stage 3: Full Rollout (100%) ──────────────────────────────────────────
  canary-100:
    name: "Full Rollout (100%)"
    runs-on: ubuntu-latest
    needs: canary-50
    environment:
      name: ${{ inputs.target_environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.target_environment == 'production' && secrets.AWS_ROLE_PRODUCTION || secrets.AWS_ROLE_STAGING }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          CLUSTER="greyeye-${{ inputs.target_environment }}"
          aws eks update-kubeconfig --name "${CLUSTER}" --region ${{ env.AWS_REGION }}

      - name: Promote model to primary
        run: |
          NAMESPACE="greyeye-${{ inputs.target_environment }}"

          kubectl set env deployment/greyeye-inference-worker \
            --namespace "${NAMESPACE}" \
            MODEL_VERSION="${{ inputs.model_version }}" \
            MODEL_S3_PATH="${{ inputs.model_s3_path }}" \
            MODEL_TYPE="${{ inputs.model_type }}" \
            CANARY_WEIGHT- \
            CANARY_MODEL_VERSION- \
            CANARY_MODEL_S3_PATH- \
            CANARY_MODEL_TYPE-

          kubectl delete configmap model-canary-${{ inputs.model_type }} \
            --namespace "${NAMESPACE}" --ignore-not-found

          kubectl rollout restart deployment/greyeye-inference-worker \
            --namespace "${NAMESPACE}"

          kubectl rollout status deployment/greyeye-inference-worker \
            --namespace "${NAMESPACE}" --timeout=10m

          echo "Model ${{ inputs.model_version }} fully rolled out."

      - name: Final health check
        run: |
          NAMESPACE="greyeye-${{ inputs.target_environment }}"
          sleep 30

          READY=$(kubectl get deployment greyeye-inference-worker \
            -n "${NAMESPACE}" -o jsonpath='{.status.readyReplicas}')
          DESIRED=$(kubectl get deployment greyeye-inference-worker \
            -n "${NAMESPACE}" -o jsonpath='{.spec.replicas}')

          echo "Inference workers: ${READY}/${DESIRED} ready"
          if [[ "$READY" -ne "$DESIRED" ]]; then
            echo "::error::Not all inference workers are ready after full rollout."
            exit 1
          fi
          echo "Full rollout verified."

  # ── Rollback (runs on any canary stage failure) ────────────────────────────
  rollback:
    name: Canary Rollback
    runs-on: ubuntu-latest
    needs: [canary-10, canary-50, canary-100]
    if: failure()
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.target_environment == 'production' && secrets.AWS_ROLE_PRODUCTION || secrets.AWS_ROLE_STAGING }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          CLUSTER="greyeye-${{ inputs.target_environment }}"
          aws eks update-kubeconfig --name "${CLUSTER}" --region ${{ env.AWS_REGION }}

      - name: Rollback canary
        run: |
          NAMESPACE="greyeye-${{ inputs.target_environment }}"
          echo "::warning::Canary deployment failed — rolling back."

          kubectl set env deployment/greyeye-inference-worker \
            --namespace "${NAMESPACE}" \
            CANARY_WEIGHT- \
            CANARY_MODEL_VERSION- \
            CANARY_MODEL_S3_PATH- \
            CANARY_MODEL_TYPE-

          kubectl delete configmap model-canary-${{ inputs.model_type }} \
            --namespace "${NAMESPACE}" --ignore-not-found

          kubectl rollout restart deployment/greyeye-inference-worker \
            --namespace "${NAMESPACE}"

          kubectl rollout status deployment/greyeye-inference-worker \
            --namespace "${NAMESPACE}" --timeout=10m

          echo "Canary rollback complete."
