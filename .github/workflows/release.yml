###############################################################################
# GreyEye — Release Pipeline
#
# Triggered on version tags (v*). Builds and pushes all Docker images with
# the release tag, creates a GitHub Release, and optionally triggers
# production deployment.
###############################################################################

name: Release

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io/greyeye

permissions:
  contents: write
  packages: write

jobs:
  # ── Build & Push Release Images ────────────────────────────────────────────
  build:
    name: "Build: ${{ matrix.service }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth_service
          - config_service
          - ingest_service
          - inference_worker
          - aggregator
          - reporting_api
          - notification_service
          - api_gateway
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.service }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Create GitHub Release ──────────────────────────────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [[ -n "$PREV_TAG" ]]; then
            CHANGES=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGES=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
          fi
          {
            echo "changes<<EOF"
            echo "$CHANGES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Docker Images

            All service images are published to `ghcr.io/greyeye/<service>:${{ github.ref_name }}`.

            ### Services
            | Service | Image |
            |---------|-------|
            | API Gateway | `${{ env.REGISTRY }}/api_gateway:${{ github.ref_name }}` |
            | Auth Service | `${{ env.REGISTRY }}/auth_service:${{ github.ref_name }}` |
            | Config Service | `${{ env.REGISTRY }}/config_service:${{ github.ref_name }}` |
            | Ingest Service | `${{ env.REGISTRY }}/ingest_service:${{ github.ref_name }}` |
            | Inference Worker | `${{ env.REGISTRY }}/inference_worker:${{ github.ref_name }}` |
            | Aggregator | `${{ env.REGISTRY }}/aggregator:${{ github.ref_name }}` |
            | Reporting API | `${{ env.REGISTRY }}/reporting_api:${{ github.ref_name }}` |
            | Notification Service | `${{ env.REGISTRY }}/notification_service:${{ github.ref_name }}` |

            ## Changes

            ${{ steps.changelog.outputs.changes }}

            ## Deploy

            To deploy this release to production:
            ```bash
            gh workflow run deploy-production.yml -f image_tag=${{ github.sha }}
            ```
