###############################################################################
# GreyEye — Smoke Test Composite Action
#
# Reusable action for running smoke tests against any environment.
###############################################################################

name: Smoke Test
description: Run health and API smoke tests against a GreyEye deployment

inputs:
  api_base_url:
    description: "Base URL of the API (e.g. https://api-staging.greyeye.io)"
    required: true
  smoke_test_password:
    description: "Password for the smoke test user"
    required: false
    default: ""
  timeout:
    description: "HTTP request timeout in seconds"
    required: false
    default: "15"
  comprehensive:
    description: "Run the comprehensive smoke test script (includes CRUD, ingest, analytics)"
    required: false
    default: "false"

outputs:
  result:
    description: "pass or fail"
    value: ${{ steps.comprehensive.outputs.result || steps.smoke.outputs.result }}

runs:
  using: composite
  steps:
    - name: Run comprehensive smoke tests
      if: inputs.comprehensive == 'true'
      id: comprehensive
      shell: bash
      env:
        API_BASE_URL: ${{ inputs.api_base_url }}
        SMOKE_TEST_PASSWORD: ${{ inputs.smoke_test_password }}
        SMOKE_TIMEOUT: ${{ inputs.timeout }}
        CLEANUP: "true"
      run: |
        if bash infra/scripts/production-smoke-test.sh; then
          echo "result=pass" >> "$GITHUB_OUTPUT"
        else
          echo "result=fail" >> "$GITHUB_OUTPUT"
          exit 1
        fi

    - name: Run smoke tests
      if: inputs.comprehensive != 'true'
      id: smoke
      shell: bash
      env:
        API_BASE_URL: ${{ inputs.api_base_url }}
        SMOKE_TEST_PASSWORD: ${{ inputs.smoke_test_password }}
        TIMEOUT: ${{ inputs.timeout }}
      run: |
        set -euo pipefail
        FAILED=0

        echo "══════════════════════════════════════════"
        echo "  Smoke Tests: ${API_BASE_URL}"
        echo "══════════════════════════════════════════"
        echo ""

        echo "── Health Endpoints ──"
        ENDPOINTS=("/healthz" "/v1/auth/healthz" "/v1/config/healthz" "/v1/ingest/healthz" "/v1/analytics/healthz")
        for ep in "${ENDPOINTS[@]}"; do
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time "${TIMEOUT}" "${API_BASE_URL}${ep}" || echo "000")
          if [[ "$STATUS" == "200" ]]; then
            echo "  ✓ ${ep} -> ${STATUS}"
          else
            echo "  ✗ ${ep} -> ${STATUS}"
            FAILED=1
          fi
        done

        echo ""
        echo "── Response Time ──"
        TOTAL_TIME=$(curl -s -o /dev/null -w "%{time_total}" --max-time "${TIMEOUT}" "${API_BASE_URL}/healthz" || echo "0")
        echo "  /healthz response time: ${TOTAL_TIME}s"
        SLOW=$(echo "$TOTAL_TIME > 5.0" | bc -l 2>/dev/null || echo "0")
        if [[ "$SLOW" == "1" ]]; then
          echo "  ⚠ Response time exceeds 5s threshold"
        fi

        if [[ -n "${SMOKE_TEST_PASSWORD}" ]]; then
          echo ""
          echo "── Auth Flow ──"
          TOKEN_RESP=$(curl -s --max-time "${TIMEOUT}" -X POST "${API_BASE_URL}/v1/auth/login" \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"smoke@greyeye.io\",\"password\":\"${SMOKE_TEST_PASSWORD}\"}" || echo '{}')
          if echo "$TOKEN_RESP" | grep -q "access_token"; then
            echo "  ✓ Login succeeded"
          else
            echo "  ⚠ Login failed (non-blocking)"
          fi
        fi

        echo ""
        if [[ "$FAILED" -eq 1 ]]; then
          echo "result=fail" >> "$GITHUB_OUTPUT"
          echo "::error::Smoke tests failed."
          exit 1
        fi
        echo "result=pass" >> "$GITHUB_OUTPUT"
        echo "All smoke tests passed."
